# CodeQL-configuratie.
#
# We richten de analyse op de server-side aanvalsoppervlakte: de Node/Express-
# backend (server/) en de build-/onderhoudsscripts (scripts/). Dat is de code
# die verzoeken, opslag, auth en betalingen afhandelt - waar statische analyse
# echt iets toevoegt en waar de bevindingen betrouwbaar zijn.
#
# De frontend (public/) wordt bewust NIET door CodeQL geanalyseerd, om twee
# redenen:
#   1. De app-scripts worden door scripts/build.js opgebouwd uit losse delen in
#      public/apps/<naam>/. Die delen zijn geen op zichzelf staande, geldige JS
#      (de bundel is dat pas); CodeQL kan ze niet betrouwbaar parsen ("Unexpected
#      token") en levert dan onbetrouwbare resultaten op fragmenten.
#   2. De frontend draait onder een strikte, nonce-gebaseerde CSP zonder inline
#      handlers (afgedwongen door scripts/check.js), plus axe- en e2e-tests. De
#      client-side XSS-oppervlakte is daarmee op een andere laag afgedekt.
#
# Alle CodeQL-beveiligingsquery's blijven volledig actief - ze draaien nu alleen
# op de server-code (injectie, path-traversal, SSRF, prototype-pollution,
# command-injection, hardcoded secrets, onveilige crypto, enz.). Zo betekent een
# alert weer echt iets, in plaats van ruis uit niet-parseerbare frontend-delen.
name: "RTG CodeQL"

paths:
  - server
  - scripts
