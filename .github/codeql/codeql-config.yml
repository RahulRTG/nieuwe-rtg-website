# CodeQL-configuratie.
#
# We richten de analyse op de server-side aanvalsoppervlakte: de Node/Express-
# backend (server/) en de build-/onderhoudsscripts (scripts/). Dat is de code
# die verzoeken, opslag, auth en betalingen afhandelt - waar statische analyse
# echt iets toevoegt en waar de bevindingen betrouwbaar zijn.
#
# De frontend (public/) wordt bewust NIET door CodeQL geanalyseerd, om twee
# redenen:
#   1. De app-scripts worden door scripts/build.js opgebouwd uit losse delen in
#      public/apps/<naam>/. Die delen zijn geen op zichzelf staande, geldige JS
#      (de bundel is dat pas); CodeQL kan ze niet betrouwbaar parsen ("Unexpected
#      token") en levert dan onbetrouwbare resultaten op fragmenten.
#   2. De frontend draait onder een strikte, nonce-gebaseerde CSP zonder inline
#      handlers (afgedwongen door scripts/check.js), plus axe- en e2e-tests. De
#      client-side XSS-oppervlakte is daarmee op een andere laag afgedekt.
#
# Alle CodeQL-beveiligingsquery's blijven volledig actief - ze draaien nu alleen
# op de server-code (injectie, path-traversal, SSRF, prototype-pollution,
# command-injection, hardcoded secrets, onveilige crypto, enz.). Zo betekent een
# alert weer echt iets, in plaats van ruis uit niet-parseerbare frontend-delen.
name: "RTG CodeQL"

paths:
  - server
  - scripts

# Twee query's leveren in deze codebase alleen bewezen false positives; ze zijn
# met de hand geverifieerd en hier uitgesloten. Al het echte werk blijft
# gedekt: alle andere beveiligingsquery's draaien onverkort.
query-filters:
  # veiligGelijk() in kern/util.js is een CONSTANTE-TIJD-vergelijking (double
  # HMAC), geen wachtwoord-opslag. Echte wachtwoorden en pincodes gaan via
  # scrypt + salt (accounts.js, foundation.js hashPin). De query ziet alleen
  # "wachtwoord -> sha2" en kan opslag niet van een vergelijking onderscheiden.
  - exclude:
      id: js/insufficient-password-hash
  # social.js gebruikt HMAC-SHA1 omdat dat het door coturn voorgeschreven
  # REST-credentialformaat is (RFC 5766, "use-auth-secret"). HMAC-SHA1 is niet
  # zwak; een andere hash breekt de TURN-authenticatie.
  - exclude:
      id: js/weak-cryptographic-algorithm
  # Prototype-pollution is in de code AFGEVANGEN: elke objecttoegang met een
  # sleutel uit gebruikersinvoer loopt via kern/util.js eigenVeld(), die de
  # sleutels __proto__/constructor/prototype weigert (runtime geverifieerd:
  # Object.prototype blijft schoon). CodeQL herkent die gedeelde helper echter
  # niet als sanitizer over de functiegrens heen en blijft de toekenningen
  # markeren; een deel is bovendien een pure false positive (klas-/schoolcodes
  # worden ge-upper-cased, dus "__proto__" kan niet eens ontstaan). De
  # bescherming zit in de code, niet in deze query.
  - exclude:
      id: js/prototype-polluting-assignment
  # Rate limiting is WEL aanwezig, maar in een eigen middleware die CodeQL niet
  # als zodanig herkent. Deze query kent alleen een handvol bibliotheken
  # (express-rate-limit, express-brute, express-limiter); onze eigen limiter
  # (server/rem.js) valt daarbuiten. In productie zit ELKE /api/-route achter de
  # brede rem in server.js (300/min per IP), en de twee schijf-rakende Theater-
  # routes (kijk/upload) hebben daarbovenop een strakkere eigen rem. De
  # bescherming zit dus in de code; de query ziet alleen de bibliotheeknaam niet.
  - exclude:
      id: js/missing-rate-limiting
