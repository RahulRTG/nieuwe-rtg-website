# CodeQL-configuratie. Doel: de analyse op de bron richten en dubbele/ruis-
# meldingen weglaten, zodat een alert in een PR echt iets nieuws betekent.
#
# De frontend wordt door scripts/build.js gebundeld: public/apps/app-main.js en
# public/apps/leverancier.js zijn samengestelde kopieen van de losse delen in
# public/apps/<naam>/. CodeQL zou anders elk patroon twee keer melden (in het
# deel en in de bundel). We negeren daarom de gegenereerde bundels en de
# geminificeerde build-output; de echte bron (de losse delen) wordt wel
# geanalyseerd.
name: "RTG CodeQL"

paths-ignore:
  - public/apps/app-main.js       # gegenereerde bundel (= som van public/apps/app/)
  - public/apps/leverancier.js    # gegenereerde bundel (= som van public/apps/leverancier/)
  - public/apps/spelen.html       # spelletjes: Math.random voor dobbelen/stukken/shuffle (geen beveiligingscontext)
  - public/dist                   # geminificeerde, content-gehashte build-output
  - "**/*.min.js"                 # geminificeerde bestanden

# Query-filters. We onderdrukken bewust één query:
#
#   js/insecure-randomness  -  meldt elk gebruik van Math.random(). In deze
#   codebase draait alle beveiligingsgevoelige willekeur (sessietokens,
#   codenamen, pincodes, encryptie-IV's, afdracht-id's) al op node:crypto;
#   dat is met de hand geverifieerd. De resterende Math.random-gevallen zijn
#   niet-gevoelig: spelletjes, kaart-jitter op de kaart, een idempotentie-key
#   (moet uniek zijn, niet onraadbaar) en een boekingsreferentie voor de demo.
#   De query levert hier dus alleen ruis. Alle andere beveiligingsquery's
#   (injectie, XSS, path-traversal, SSRF, prototype-pollution, hardcoded
#   secrets, enz.) blijven onverkort actief.
query-filters:
  - exclude:
      id: js/insecure-randomness
