name: CI

on:
  push:
    branches: [ main, master, 'claude/**' ]
  pull_request:

jobs:
  test:
    name: Tests, checks en build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rtgtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Codeafspraken (check.js)
        run: npm run check
      - name: Eigen AST-scan (statische analyse, geen dependency)
        run: npm run ast-scan
      # De hoofdsuite draait op de standaard (json) opslag; DATABASE_URL is hier
      # bewust NIET gezet, anders zouden alle testbestanden dezelfde Postgres delen.
      # test:gate draait dezelfde suite MET een dekkingsvloer (regels/branches/
      # functies): zakt de in-proces-dekking onder de vloer, dan faalt de stap.
      # De vloeren staan bewust een paar punten onder de gemeten basislijn
      # (63/80/51) zodat normale ruis niet flaket, maar echte terugval hard opvalt.
      - name: Unit- en integratietests + dekkingsvloer (json-opslag)
        run: npm run test:gate
      # De PostgreSQL-opslag, -accounts en chaos-test apart, met DATABASE_URL alleen
      # voor deze stap. Serieel (--test-concurrency=1): pg.test.js en chaos delen de
      # kv-tabel en zouden elkaar bij parallel draaien resetten.
      - name: PostgreSQL-integratietests (opslag + accounts + chaos)
        run: node --test --test-concurrency=1 test/pg.test.js test/pgaccounts.test.js test/chaos.pg.test.js
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rtgtest
          RTG_VAULT_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          RTG_SECRET_KEY: fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210
      - name: Frontend-build (minify + service-worker-cache)
        run: npm run build
      - name: Build is idempotent (geen ongecommitte wijziging aan de bron)
        run: git diff --exit-code -- public server scripts

  security:
    name: Kwetsbare dependencies (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      # Eerst het volledige rapport tonen (faalt niet), zodat ook moderate/low
      # zichtbaar zijn in de log; daarna de harde poort op high + critical.
      - name: Volledig audit-rapport (informatief)
        run: npm audit || true
      - name: Harde poort - faal op kwetsbare dependencies (high/critical)
        run: npm audit --audit-level=high
      - name: Secret-scan - faal op gelekte sleutels/tokens in de broncode
        run: npm run secrets

  a11y:
    name: Toegankelijkheid (eigen keuring)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Playwright + Chromium
        run: |
          npm i --no-save playwright@^1.49.0
          npx playwright install --with-deps chromium
      - name: Eigen a11y-scan van de vlaggenschip-schermen
        run: node scripts/a11y.js
        env:
          A11Y_STRICT: '1'
      - name: Scherm-tests (PDA in de browser)
        run: npm run e2e
