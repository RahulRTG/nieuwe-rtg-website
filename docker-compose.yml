# Lokale/kleine productie-opstelling: de app + Redis (voor realtime over meerdere
# instances). Zet je geheimen in een .env-bestand naast dit bestand (zie
# .env.example); compose leest die automatisch.
#
# Starten:  docker compose up -d --build
# Logs:     docker compose logs -f app
# Stoppen:  docker compose down
services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://rtg:${POSTGRES_PASSWORD:-rtg}@postgres:5432/rtg
      # de rest komt uit .env (RTG_ENC_KEY, APP_URL, STRIPE_SECRET_KEY, ...)
      RTG_ENC_KEY: ${RTG_ENC_KEY:-}
      RTG_VAULT_KEY: ${RTG_VAULT_KEY:-}
      RTG_SECRET_KEY: ${RTG_SECRET_KEY:-}
      APP_URL: ${APP_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - rtg-data:/app/server/data
    depends_on:
      - redis
      - postgres
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/ready',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 4s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - rtg-redis:/data

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rtg
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rtg}
      POSTGRES_DB: rtg
    volumes:
      - rtg-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtg"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rtg-data:
  rtg-redis:
  rtg-pg:
