<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cellier · Lifestyle Pass</title>
<link rel="icon" href="/icons/partners.svg">
<link href="/fonts/fonts.css" rel="stylesheet">
<style>
  :root{ --bg:#0C0C0B; --card:#151312; --card2:#1B1817; --line:rgba(255,255,255,0.10);
    --txt:#F4F1EC; --muted:rgba(244,241,236,0.68); --soft:rgba(244,241,236,0.5); --burgundy:#C23A5E; --gold:#A98F1C; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;padding-bottom:3rem;}
  h1,h2{font-family:'Bodoni Moda',serif;font-weight:500;letter-spacing:-.01em;}
  header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg),rgba(12,12,11,.86));backdrop-filter:blur(8px);padding:1rem 1.1rem .7rem;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:.8rem;}
  header .ey{font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);}
  header h1{font-size:1.35rem;}
  .terug{margin-left:auto;background:transparent;border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:.4rem .7rem;font:inherit;font-size:.8rem;cursor:pointer;}
  main{padding:1.1rem;max-width:760px;margin:0 auto;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.7rem;margin-bottom:1rem;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:.9rem 1rem;}
  .stat .n{font-family:'Bodoni Moda',serif;font-size:1.5rem;}
  .stat .l{font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);margin-top:.15rem;}
  .kaart{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1rem 1.1rem;margin-bottom:.9rem;}
  .kaart h2{font-size:1.05rem;margin-bottom:.5rem;}
  .lbl{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);margin:.5rem 0 .25rem;display:block;}
  .veld,select.veld{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--txt);font:inherit;font-size:.9rem;padding:.5rem .7rem;}
  .rij{display:flex;gap:.5rem;flex-wrap:wrap;}
  .rij>*{flex:1;min-width:6rem;}
  .knop{background:var(--gold);color:#000;border:none;border-radius:10px;font:inherit;font-weight:600;font-size:.85rem;padding:.5rem 1rem;cursor:pointer;}
  .fles{border-top:1px solid var(--line);padding:.6rem 0;display:flex;gap:.7rem;align-items:flex-start;}
  .fles:first-child{border-top:0;}
  .fles .b{flex:1;min-width:0;}
  .fles .b .nm{font-weight:600;}
  .fles .b small{color:var(--soft);}
  .staat{font-size:.7rem;padding:.12rem .5rem;border-radius:999px;border:1px solid var(--line);color:var(--muted);white-space:nowrap;}
  .staat.op{border-color:var(--gold);color:var(--gold);}
  .staat.over{border-color:var(--burgundy);color:var(--burgundy);}
  .mini{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:8px;font:inherit;font-size:.75rem;padding:.25rem .5rem;cursor:pointer;}
  .mini:hover{border-color:var(--gold);}
  .leeg{color:var(--soft);font-size:.86rem;padding:.4rem 0;}
  .melding{position:fixed;left:50%;bottom:1.2rem;transform:translateX(-50%);background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:.6rem 1rem;font-size:.85rem;opacity:0;transition:opacity .3s;z-index:30;pointer-events:none;}
  .inlog{text-align:center;padding:2.5rem 1rem;}
</style>
<link href="/shared/rtg-uniform.css" rel="stylesheet">
</head>
<body>
<header><div><div class="ey">Lifestyle Pass</div><h1>Cellier</h1></div><a class="terug" href="/apps/app.html?pas=lifestyle">← app</a></header>
<main id="main"><div class="leeg">Laden…</div></main>
<div class="melding" id="melding"></div>
<script>
const $=s=>document.querySelector(s);
const esc=t=>String(t==null?'':t).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let TOKEN=null; try{ TOKEN=localStorage.getItem('rtg_member_token'); }catch(e){}
function meld(t){ const m=$('#melding'); m.textContent=t; m.style.opacity='1'; clearTimeout(m._t); m._t=setTimeout(()=>m.style.opacity='0',2600); }
const api=(pad,body)=>fetch('/api/member/rechterhand/'+pad,{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+TOKEN},body:JSON.stringify(body||{})}).then(async r=>{const d=await r.json().catch(()=>({}));if(!r.ok){const e=new Error(d.error||'Er ging iets mis.');e.status=r.status;throw e;}return d;});
const euro=c=>'€ '+Number(c||0).toLocaleString('nl-NL');
const AIBOX=app=>'<div class="kaart"><h2>🤝 Vraag de sommelier</h2><div style="display:flex;gap:.5rem;"><input class="veld" id="aiV" style="flex:1;" placeholder="'+app+'"><button class="knop" id="aiK">Vraag</button></div><div id="aiA" style="margin-top:.6rem;font-size:.92rem;line-height:1.55;color:var(--muted);"></div></div>';
function bindAi(app){ const k=$('#aiK'); if(!k)return; k.onclick=async()=>{ const v=$('#aiV').value.trim(); if(!v)return; $('#aiA').textContent='Een ogenblik…'; try{ const r=await api('ai',{app,vraag:v}); $('#aiA').textContent=r.antwoord; $('#aiV').value=''; }catch(e){ $('#aiA').textContent=e.message; } }; $('#aiV').addEventListener('keydown',e=>{ if(e.key==='Enter') k.click(); }); }
async function laad(){
  if(!TOKEN){ $('#main').innerHTML='<div class="inlog"><h2>Log eerst in</h2></div>'; return; }
  let d; try{ d=await api('cellier'); }catch(e){ if(e.status===403){ $('#main').innerHTML='<div class="inlog"><h2>Alleen met de Lifestyle Pass</h2><p style="color:var(--muted);margin-top:.6rem;">Cellier is onderdeel van de Lifestyle Pass.</p></div>'; return; } $('#main').innerHTML='<div class="leeg">Kon de kelder niet laden.</div>'; return; }
  const kl=d.kleuren;
  let h='<div class="grid"><div class="stat"><div class="n">'+d.totaalFlessen+'</div><div class="l">Flessen</div></div><div class="stat"><div class="n">'+euro(d.kelderwaarde)+'</div><div class="l">Kelderwaarde</div></div><div class="stat"><div class="n">'+d.opDronk+'</div><div class="l">Nu op dronk</div></div></div>';
  h+='<div class="kaart"><h2>Fles toevoegen</h2><div class="rij"><input class="veld" id="cN" placeholder="Wijn"><input class="veld" id="cD" placeholder="Domein/producent"></div><div class="rij" style="margin-top:.4rem;"><select class="veld" id="cK">'+kl.map(k=>'<option>'+k+'</option>').join('')+'</select><input class="veld" id="cJ" type="number" placeholder="jaargang"><input class="veld" id="cA" type="number" placeholder="aantal" value="1"><input class="veld" id="cW" type="number" placeholder="€/fles"></div><div class="rij" style="margin-top:.4rem;"><input class="veld" id="cV" type="number" placeholder="drink vanaf"><input class="veld" id="cT" type="number" placeholder="drink tot"></div><div style="margin-top:.6rem;"><button class="knop" id="cDoe">In de kelder</button></div></div>';
  h+='<div class="kaart"><h2>Uw kelder</h2><div id="lijst"></div></div>';
  h+=AIBOX('Bijv. welke fles schenk ik vanavond?');
  $('#main').innerHTML=h;
  bindAi('cellier');
  $('#cDoe').onclick=async()=>{ const naam=$('#cN').value.trim(); if(!naam) return meld('Welke wijn?'); try{ await api('cellier/zet',{naam,domein:$('#cD').value,kleur:$('#cK').value,jaargang:$('#cJ').value,aantal:$('#cA').value,waarde:$('#cW').value,drinkVan:$('#cV').value,drinkTot:$('#cT').value}); laad(); }catch(e){ meld(e.message); } };
  const box=$('#lijst');
  box.innerHTML = d.flessen.length ? d.flessen.map(f=>{
    const st=f.staat==='op dronk'?'op':f.staat==='over de top'?'over':'';
    return '<div class="fles"><div class="b"><div class="nm">'+esc(f.naam)+(f.jaargang?' '+f.jaargang:'')+'</div><small>'+[esc(f.domein),esc(f.kleur),f.aantal+'×',euro(f.waarde)+'/fles'].filter(Boolean).join(' · ')+'</small></div><span class="staat '+st+'">'+esc(f.staat)+'</span><button class="mini" data-schenk="'+f.id+'">schenken</button><button class="mini" data-weg="'+f.id+'">×</button></div>';
  }).join('') : '<div class="leeg">Uw kelder is nog leeg.</div>';
  box.querySelectorAll('[data-schenk]').forEach(b=> b.onclick=async()=>{ try{ await api('cellier/schenk',{id:b.dataset.schenk}); laad(); }catch(e){ meld(e.message); } });
  box.querySelectorAll('[data-weg]').forEach(b=> b.onclick=async()=>{ if(!confirm('Deze wijn uit de kelder halen?'))return; try{ await api('cellier/weg',{id:b.dataset.weg}); laad(); }catch(e){ meld(e.message); } });
}
laad();
</script>
<script src="/shared/schermbeeld.js" defer></script>
<script src="/shared/metgezel.js" defer></script>
<script src="/shared/basis.js" defer></script>
<script src="/shared/cookie.js" defer></script>
</body>
</html>
