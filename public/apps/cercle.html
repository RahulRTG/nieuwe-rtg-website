<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cercle · Lifestyle Pass</title>
<link rel="icon" href="/icons/partners.svg">
<link href="/fonts/fonts.css" rel="stylesheet">
<style>
  :root{ --bg:#0C0C0B; --card:#151312; --card2:#1B1817; --line:rgba(255,255,255,0.10);
    --txt:#F4F1EC; --muted:rgba(244,241,236,0.68); --soft:rgba(244,241,236,0.5); --burgundy:#C23A5E; --gold:#A98F1C; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;padding-bottom:3rem;}
  h1,h2{font-family:'Bodoni Moda',serif;font-weight:500;letter-spacing:-.01em;}
  header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg),rgba(12,12,11,.86));backdrop-filter:blur(8px);padding:1rem 1.1rem .7rem;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:.8rem;}
  header .ey{font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);}
  header h1{font-size:1.35rem;}
  .terug{margin-left:auto;background:transparent;border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:.4rem .7rem;font:inherit;font-size:.8rem;cursor:pointer;}
  main{padding:1.1rem;max-width:760px;margin:0 auto;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:.7rem;margin-bottom:1rem;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:.9rem 1rem;}
  .stat .n{font-family:'Bodoni Moda',serif;font-size:1.5rem;}
  .stat .l{font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);margin-top:.15rem;}
  .kaart{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1rem 1.1rem;margin-bottom:.9rem;}
  .kaart h2{font-size:1.05rem;margin-bottom:.5rem;}
  .veld,textarea.veld{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--txt);font:inherit;font-size:.9rem;padding:.5rem .7rem;}
  textarea.veld{min-height:2.8rem;resize:vertical;}
  .rij{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem;}
  .rij>*{flex:1;min-width:6rem;}
  .knop{background:var(--gold);color:#000;border:none;border-radius:10px;font:inherit;font-weight:600;font-size:.85rem;padding:.5rem 1rem;cursor:pointer;}
  .club{border-top:1px solid var(--line);padding:.7rem 0;display:flex;gap:.7rem;align-items:flex-start;}
  .club:first-child{border-top:0;}
  .club .b{flex:1;min-width:0;}
  .club .b .nm{font-weight:600;}
  .club .b .st{font-size:.78rem;color:var(--gold);}
  .club .b small{color:var(--soft);display:block;margin-top:.15rem;}
  .pas{font-size:.66rem;padding:.12rem .5rem;border-radius:999px;border:1px solid var(--gold);color:var(--gold);white-space:nowrap;}
  .weg{background:transparent;border:1px solid var(--line);color:var(--soft);border-radius:8px;width:1.8rem;height:1.8rem;cursor:pointer;flex-shrink:0;}
  .weg:hover{border-color:var(--gold);color:var(--txt);}
  .leeg{color:var(--soft);font-size:.86rem;padding:.4rem 0;}
  .melding{position:fixed;left:50%;bottom:1.2rem;transform:translateX(-50%);background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:.6rem 1rem;font-size:.85rem;opacity:0;transition:opacity .3s;z-index:30;pointer-events:none;}
  .inlog{text-align:center;padding:2.5rem 1rem;}
</style>
<link href="/shared/rtg-uniform.css" rel="stylesheet">
</head>
<body>
<header><div><div class="ey">Lifestyle Pass</div><h1>Cercle</h1></div><a class="terug" href="/apps/app.html?pas=lifestyle">← app</a></header>
<main id="main"><div class="leeg">Laden…</div></main>
<div class="melding" id="melding"></div>
<script>
const $=s=>document.querySelector(s);
const esc=t=>String(t==null?'':t).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let TOKEN=null; try{ TOKEN=localStorage.getItem('rtg_member_token'); }catch(e){}
function meld(t){ const m=$('#melding'); m.textContent=t; m.style.opacity='1'; clearTimeout(m._t); m._t=setTimeout(()=>m.style.opacity='0',2600); }
const api=(pad,body)=>fetch('/api/member/rechterhand/'+pad,{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+TOKEN},body:JSON.stringify(body||{})}).then(async r=>{const d=await r.json().catch(()=>({}));if(!r.ok){const e=new Error(d.error||'Er ging iets mis.');e.status=r.status;throw e;}return d;});
const AIBOX=app=>'<div class="kaart"><h2>🤝 Vraag de clubsecretaris</h2><div style="display:flex;gap:.5rem;"><input class="veld" id="aiV" style="flex:1;" placeholder="'+app+'"><button class="knop" id="aiK">Vraag</button></div><div id="aiA" style="margin-top:.6rem;font-size:.92rem;line-height:1.55;color:var(--muted);"></div></div>';
function bindAi(app){ const k=$('#aiK'); if(!k)return; k.onclick=async()=>{ const v=$('#aiV').value.trim(); if(!v)return; $('#aiA').textContent='Een ogenblik…'; try{ const r=await api('ai',{app,vraag:v}); $('#aiA').textContent=r.antwoord; $('#aiV').value=''; }catch(e){ $('#aiA').textContent=e.message; } }; $('#aiV').addEventListener('keydown',e=>{ if(e.key==='Enter') k.click(); }); }
async function laad(){
  if(!TOKEN){ $('#main').innerHTML='<div class="inlog"><h2>Log eerst in</h2></div>'; return; }
  let d; try{ d=await api('cercle'); }catch(e){ if(e.status===403){ $('#main').innerHTML='<div class="inlog"><h2>Alleen met de Lifestyle Pass</h2><p style="color:var(--muted);margin-top:.6rem;">Cercle is onderdeel van de Lifestyle Pass.</p></div>'; return; } $('#main').innerHTML='<div class="leeg">Kon uw Cercle niet laden.</div>'; return; }
  let h='<div class="grid"><div class="stat"><div class="n">'+d.aantal+'</div><div class="l">Clubs</div></div><div class="stat"><div class="n">'+d.steden+'</div><div class="l">Steden</div></div><div class="stat"><div class="n">'+d.gastpassen+'</div><div class="l">Gastpassen</div></div></div>';
  h+='<div class="kaart"><h2>Club toevoegen</h2><div class="rij"><input class="veld" id="cN" placeholder="clubnaam"><input class="veld" id="cS" placeholder="stad"></div><div class="rij"><input class="veld" id="cL" placeholder="lidnummer"><input class="veld" id="cSi" type="number" placeholder="lid sinds"><input class="veld" id="cG" type="number" placeholder="gastpassen"></div><div class="rij"><input class="veld" id="cD" placeholder="dresscode"></div><div class="rij"><textarea class="veld" id="cR" placeholder="reciprociteit: bij welke clubs bent u als gast welkom?"></textarea></div><div style="margin-top:.6rem;"><button class="knop" id="cAdd">+ club</button></div></div>';
  h+='<div class="kaart"><h2>Uw clubs</h2><div id="lijst">'+(d.clubs.length?d.clubs.map(c=>'<div class="club"><div class="b"><div class="nm">'+esc(c.naam)+'</div><div class="st">'+[esc(c.stad),c.sinds?'sinds '+c.sinds:''].filter(Boolean).join(' · ')+'</div><small>'+[c.lidnummer?'nr. '+esc(c.lidnummer):'',c.dresscode?'dresscode: '+esc(c.dresscode):'',c.reciprociteit?'reciprociteit: '+esc(c.reciprociteit):''].filter(Boolean).join(' · ')+'</small></div>'+(Number(c.gastpassen)>0?'<span class="pas">'+c.gastpassen+' passen</span>':'')+'<button class="weg" data-weg="'+c.id+'">×</button></div>').join(''):'<div class="leeg">Nog geen clubs.</div>')+'</div></div>';
  h+=AIBOX('Bijv. waar kan ik in Parijs als gast terecht?');
  $('#main').innerHTML=h;
  bindAi('cercle');
  $('#cAdd').onclick=async()=>{ const naam=$('#cN').value.trim(); if(!naam) return meld('Welke club?'); try{ await api('cercle/club',{naam,stad:$('#cS').value,lidnummer:$('#cL').value,sinds:$('#cSi').value,gastpassen:$('#cG').value,dresscode:$('#cD').value,reciprociteit:$('#cR').value}); laad(); }catch(e){ meld(e.message); } };
  document.querySelectorAll('[data-weg]').forEach(b=> b.onclick=async()=>{ if(!confirm('Deze club verwijderen?'))return; try{ await api('cercle/club/weg',{id:b.dataset.weg}); laad(); }catch(e){ meld(e.message); } });
}
laad();
</script>
<script src="/shared/schermbeeld.js" defer></script>
<script src="/shared/metgezel.js" defer></script>
</body>
</html>
