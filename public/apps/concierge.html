<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Concierge-bureau · De Rechterhand</title>
<link rel="icon" href="/icons/pas-lifestyle.svg">
<meta name="robots" content="noindex">
<link href="/fonts/fonts.css" rel="stylesheet">
<style>
  :root{ --bg:#0C0C0B; --card:#151312; --card2:#1B1817; --line:rgba(255,255,255,0.10);
    --txt:#F4F1EC; --muted:rgba(244,241,236,0.68); --soft:rgba(244,241,236,0.5);
    --burgundy:#C23A5E; --gold:#A98F1C; --green:#4C9A75; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;padding-bottom:3rem;}
  h1,h2{font-family:'Bodoni Moda',serif;font-weight:500;letter-spacing:-.01em;}
  header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg),rgba(12,12,11,.86));backdrop-filter:blur(8px);padding:1rem 1.1rem .7rem;border-bottom:1px solid var(--line);}
  header .ey{font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);}
  header h1{font-size:1.35rem;}
  main{padding:1.1rem;max-width:760px;margin:0 auto;}
  .kaart{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1rem 1.1rem;margin-bottom:.9rem;}
  .kaart .kop{display:flex;align-items:baseline;gap:.6rem;justify-content:space-between;}
  .kaart .nm{font-weight:600;}
  .kaart .cn{font-size:.78rem;color:var(--soft);letter-spacing:.04em;text-transform:uppercase;}
  .meta{font-size:.82rem;color:var(--muted);margin-top:.3rem;line-height:1.5;}
  .status{font-size:.72rem;padding:.15rem .55rem;border-radius:999px;border:1px solid var(--line);color:var(--muted);white-space:nowrap;}
  .status.aangevraagd{border-color:var(--gold);color:var(--gold);}
  .vk{font-size:.78rem;color:var(--soft);margin-top:.4rem;}
  .acties{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.7rem;}
  .knop{background:transparent;border:1px solid var(--line);color:var(--txt);border-radius:9px;font:inherit;font-size:.8rem;padding:.4rem .7rem;cursor:pointer;}
  .knop:hover{border-color:var(--gold);}
  .knop.doe{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600;}
  .knop.af{border-color:var(--burgundy);color:var(--burgundy);}
  .veld{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--txt);font:inherit;font-size:.85rem;padding:.45rem .6rem;margin-top:.6rem;}
  .leeg{color:var(--soft);text-align:center;padding:2.5rem 1rem;}
  .inlog{max-width:340px;margin:3rem auto;text-align:center;}
  .inlog input{width:100%;background:var(--card);border:1px solid var(--line);border-radius:10px;color:var(--txt);font:inherit;padding:.6rem .8rem;margin:1rem 0;text-align:center;letter-spacing:.1em;}
  .inlog .knop{width:100%;background:var(--gold);color:#000;border-color:var(--gold);font-weight:600;padding:.6rem;}
  .melding{position:fixed;left:50%;bottom:1.2rem;transform:translateX(-50%);background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:.6rem 1rem;font-size:.85rem;opacity:0;transition:opacity .3s;z-index:30;pointer-events:none;}
</style>
<link href="/shared/rtg-uniform.css" rel="stylesheet">
</head>
<body>
<header><div class="ey">RTG-kantoor</div><h1>Concierge-bureau</h1></header>
<main id="main"><div class="leeg">Laden…</div></main>
<div class="melding" id="melding"></div>
<script>
const $ = s => document.querySelector(s);
const esc = t => String(t==null?'':t).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let TOKEN=null; try{ TOKEN = localStorage.getItem('rtg_office_token'); }catch(e){}
function meld(t){ const m=$('#melding'); m.textContent=t; m.style.opacity='1'; clearTimeout(m._t); m._t=setTimeout(()=>m.style.opacity='0',2600); }
const api = (pad, body) => fetch('/api/office/'+pad, {
  method:'POST', headers:{'Content-Type':'application/json', Authorization:'Bearer '+TOKEN}, body:JSON.stringify(body||{})
}).then(async r=>{ const d=await r.json().catch(()=>({})); if(!r.ok){ const e=new Error(d.error||'Er ging iets mis.'); e.status=r.status; throw e; } return d; });
const MND=['','jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
function tijd(s){ if(!s) return ''; const d=new Date(s); return d.getDate()+' '+MND[d.getMonth()+1]+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0'); }

function inlog(){
  $('#main').innerHTML = '<div class="inlog"><h2>Kantoor-inlog</h2><input id="code" placeholder="Backoffice-code" autocomplete="off"><button class="knop" id="in">Inloggen</button></div>';
  $('#in').onclick = async ()=>{
    const code = $('#code').value.trim(); if(!code) return;
    try{ const r = await fetch('/api/office/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})}).then(x=>x.json());
      if(!r.token) throw new Error(r.error||'Onjuiste code.'); TOKEN=r.token; try{ localStorage.setItem('rtg_office_token',TOKEN); }catch(e){} laad();
    }catch(e){ meld(e.message); }
  };
  $('#code').addEventListener('keydown',e=>{ if(e.key==='Enter') $('#in').click(); });
}

async function laad(){
  let d; try{ d = await api('concierge'); }catch(e){ if(e.status===401){ TOKEN=null; return inlog(); } $('#main').innerHTML='<div class="leeg">Kon het bureau niet laden.</div>'; return; }
  STATUS = d.statussen||[];
  if(!d.verzoeken.length){ $('#main').innerHTML='<div class="leeg">Geen open verzoeken. Alles is voor de leden geregeld.</div>'; return; }
  $('#main').innerHTML = d.verzoeken.map(kaart).join('');
  d.verzoeken.forEach(bind);
}
let STATUS=[];
function kaart(v){
  const vk = Object.entries(v.voorkeuren||{}).filter(([,x])=>x).map(([k,x])=>esc(k)+': '+esc(x)).join(' · ');
  return '<div class="kaart" data-key="'+esc(v.key)+'" data-id="'+esc(v.id)+'">'
    + '<div class="kop"><span class="nm">'+esc(v.titel)+'</span><span class="status '+esc(v.status)+'">'+esc(v.status)+'</span></div>'
    + '<div class="cn">'+esc(v.codenaam||'lid')+' · '+esc(v.categorie)+' · '+tijd(v.at)+'</div>'
    + (v.details?'<div class="meta">'+esc(v.details)+'</div>':'')
    + (v.laatste?'<div class="meta">Laatste stap: '+esc(v.laatste)+'</div>':'')
    + (vk?'<div class="vk">Vaste voorkeuren - '+vk+'</div>':'')
    + '<input class="veld notitie" placeholder="Notitie voor het lid (optioneel)">'
    + '<div class="acties">'+STATUS.map(s=>'<button class="knop'+(s==='afgewezen'?' af':s==='bevestigd'||s==='afgerond'?' doe':'')+'" data-s="'+esc(s)+'">'+esc(s)+'</button>').join('')+'</div>'
    + '</div>';
}
function bind(v){
  const kaart = $('#main').querySelector('.kaart[data-id="'+v.id+'"]');
  if(!kaart) return;
  kaart.querySelectorAll('[data-s]').forEach(b=> b.onclick = async ()=>{
    try{ await api('concierge/voortgang',{ key:v.key, id:v.id, status:b.dataset.s, notitie:kaart.querySelector('.notitie').value }); meld('Bijgewerkt: '+b.dataset.s); laad(); }
    catch(e){ meld(e.message); }
  });
}

if(TOKEN) laad(); else inlog();
</script>
<script src="/shared/schermbeeld.js" defer></script>
<script src="/shared/metgezel.js" defer></script>
<script src="/shared/basis.js" defer></script>
</body>
</html>
