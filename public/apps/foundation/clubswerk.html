<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Clubs & steden · RTF</title>
<link rel="icon" href="/icons/foundation.svg">
<link href="/fonts/fonts.css" rel="stylesheet">
<style>
  :root{--bg:#0C0C0B;--card:#151312;--line:rgba(255,255,255,0.10);--txt:#F4F1EC;--muted:rgba(244,241,236,0.68);--soft:rgba(244,241,236,0.55);--burgundy:#C23A5E;--gold:#A98F1C;--green:#4C9A75;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;padding-bottom:2rem;}
  h1,h2{font-family:'Bodoni Moda',serif;font-weight:500;}
  header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg),rgba(12,12,11,.86));backdrop-filter:blur(8px);padding:.9rem 1rem .6rem;border-bottom:1px solid var(--line);display:flex;align-items:end;gap:.8rem;}
  header .ey{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--burgundy);}
  header h1{font-size:1.25rem;}
  header a{margin-left:auto;color:var(--muted);font-size:.78rem;text-decoration:none;}
  main{padding:1rem;max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:.9rem;}
  .kaart{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:.85rem .95rem;}
  .sec{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);margin:.2rem 0;}
  .rij{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;}
  .veld{flex:1;min-width:8rem;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--txt);font:inherit;font-size:.88rem;padding:.55rem .7rem;}
  select.veld{color-scheme:dark;}
  .knop{background:var(--txt);color:#000;border:none;border-radius:11px;padding:.55rem .9rem;font:inherit;font-weight:600;font-size:.84rem;cursor:pointer;}
  .knop.stil{background:transparent;color:var(--txt);border:1px solid var(--line);font-weight:500;}
  .pil{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--line);border-radius:999px;padding:.15rem .55rem;color:var(--muted);}
  .pil.actief{color:var(--green);border-color:var(--green);}
  .item{display:flex;gap:.5rem;align-items:center;padding:.3rem 0;border-bottom:1px solid var(--line);font-size:.84rem;}
  .item.af span{opacity:.45;text-decoration:line-through;}
  .log{font-size:.82rem;line-height:1.5;padding:.3rem 0;border-bottom:1px solid var(--line);}
  .log b{color:var(--gold);} .log.club b{color:var(--burgundy);}
  .leeg{color:var(--muted);font-size:.85rem;padding:.4rem 0;}
  .stad{font-family:'Bodoni Moda',serif;font-size:1.05rem;margin:.4rem 0 .2rem;}
  .code{font-family:monospace;letter-spacing:.08em;color:var(--gold);}
</style>
</head>
<body>
<header>
  <div><div class="ey">RTF-kantoor · afdeling</div><h1>🏟️ Clubs & steden</h1></div>
  <a href="kantoor.html">← RTF-kantoor</a>
</header>
<main id="main">
  <div class="kaart">
    <div class="sec">Club aanmelden</div>
    <div class="rij">
      <input class="veld" id="cNaam" placeholder="Clubnaam" maxlength="80">
      <input class="veld" id="cStad" placeholder="Stad" maxlength="60">
      <input class="veld" id="cSport" placeholder="Sport" maxlength="40">
      <button class="knop" id="cMaak">+ Club</button>
    </div>
    <div class="leeg" style="margin-top:.4rem;">De club krijgt een clubcode voor het eigen portaal (club.html); daarmee ziet de club alleen het eigen dossier.</div>
  </div>
  <div id="lijst"><div class="leeg">Laden...</div></div>
</main>
<script>
const $ = s => document.querySelector(s);
const esc = t => String(t==null?'':t).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let TOKEN = null; try { TOKEN = localStorage.getItem('rtg_office_token'); } catch (e) {}
function uitgelogd(){ location.replace('/apps/personeel.html?kantoor=1&terug=' + encodeURIComponent(location.pathname)); }
if (!TOKEN) uitgelogd();
const api = (pad, body) => fetch('/api/rtfkantoor/' + pad, { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN }, body: JSON.stringify(body || {}) })
  .then(async r => { const d = await r.json().catch(() => ({})); if (!r.ok) { if (r.status === 401) uitgelogd(); throw new Error(d.error || 'Er ging iets mis.'); } return d; });
let D = null;
async function laad(){
  D = await api('clubs');
  $('#lijst').innerHTML = D.steden.length ? D.steden.map(s => '<div class="stad">' + esc(s.stad) + '</div>' + s.clubs.map(kaart).join('')).join('')
    : '<div class="leeg">Nog geen clubs; meld de eerste aan.</div>';
  bind();
}
function kaart(c){
  const stat = D.statussen.map(s => '<option value="' + s + '"' + (c.status === s ? ' selected' : '') + '>' + s + '</option>').join('');
  return '<div class="kaart" style="margin-bottom:.7rem;" data-club="' + c.id + '">' +
    '<div class="rij" style="justify-content:space-between;"><h2 style="font-size:1.02rem;">' + esc(c.naam) + ' <span class="pil' + (c.status === 'actief' ? ' actief' : '') + '">' + esc(c.status) + '</span></h2>' +
    '<span class="code">' + esc(c.code) + '</span></div>' +
    '<div class="leeg">' + esc(c.sport) + (c.contact ? ' · contact: ' + esc(c.contact) : '') + '</div>' +
    '<div class="rij" style="margin:.35rem 0;"><select class="veld" data-status style="max-width:9rem;">' + stat + '</select>' +
    '<input class="veld" data-team value="' + esc((c.team || []).join(', ')) + '" placeholder="RTF-team (namen, met komma)"></div>' +
    '<div class="sec">Programma\'s</div>' +
    (c.programmas.length ? c.programmas.map(p => '<label class="item' + (p.af ? ' af' : '') + '"><input type="checkbox" data-prog="' + p.id + '"' + (p.af ? ' checked' : '') + '><span>' + esc(p.naam) + (p.doel ? ' · ' + esc(p.doel) : '') + '</span></label>').join('') : '<div class="leeg">Nog geen programma\'s.</div>') +
    '<div class="rij" style="margin:.35rem 0;"><input class="veld" data-pnaam placeholder="Nieuw programma (bijv. ' + esc(D.ideeen[0]) + ')" list="ideeen"><button class="knop stil" data-pmaak>+</button></div>' +
    '<div class="sec">Afspraken</div>' +
    (c.afspraken.length ? c.afspraken.map(a => '<label class="item' + (a.af ? ' af' : '') + '"><input type="checkbox" data-afs="' + a.id + '"' + (a.af ? ' checked' : '') + '><span>' + esc(a.tekst) + '</span></label>').join('') : '<div class="leeg">Nog geen afspraken.</div>') +
    '<div class="rij" style="margin:.35rem 0;"><input class="veld" data-anaam placeholder="Nieuwe afspraak"><button class="knop stil" data-amaak>+</button></div>' +
    '<div class="sec">Samenwerkingslog (club + RTF schrijven samen)</div>' +
    ((c.log || []).slice(0, 6).map(m => '<div class="log ' + esc(m.wie) + '"><b>' + esc(m.naam) + '</b>: ' + esc(m.tekst) + '</div>').join('') || '<div class="leeg">Nog stil hier.</div>') +
    '<div class="rij" style="margin-top:.35rem;"><input class="veld" data-bericht placeholder="Bericht aan de club"><button class="knop stil" data-stuur>Stuur</button></div>' +
    '</div>';
}
function bind(){
  document.querySelectorAll('[data-club]').forEach(k => {
    const id = k.dataset.club;
    const doe = (werk) => werk.then(laad).catch(e => alert(e.message));
    k.querySelector('[data-status]').addEventListener('change', ev => doe(api('club/zet', { id, status: ev.target.value })));
    k.querySelector('[data-team]').addEventListener('change', ev => doe(api('club/team', { id, namen: ev.target.value.split(',').map(x => x.trim()).filter(Boolean) })));
    k.querySelector('[data-pmaak]').addEventListener('click', () => doe(api('club/programma', { id, naam: k.querySelector('[data-pnaam]').value })));
    k.querySelector('[data-amaak]').addEventListener('click', () => doe(api('club/afspraak', { id, tekst: k.querySelector('[data-anaam]').value })));
    k.querySelector('[data-stuur]').addEventListener('click', () => doe(api('club/bericht', { id, naam: 'RTF-kantoor', tekst: k.querySelector('[data-bericht]').value })));
    k.querySelectorAll('[data-prog]').forEach(c => c.addEventListener('change', () => doe(api('club/programma-zet', { id, programmaId: c.dataset.prog, af: c.checked }))));
    k.querySelectorAll('[data-afs]').forEach(c => c.addEventListener('change', () => doe(api('club/afspraak-zet', { id, afspraakId: c.dataset.afs, af: c.checked }))));
  });
}
$('#cMaak').addEventListener('click', async () => {
  try { await api('club/maak', { naam: $('#cNaam').value, stad: $('#cStad').value, sport: $('#cSport').value });
    $('#cNaam').value = ''; $('#cStad').value = ''; $('#cSport').value = ''; laad();
  } catch (e) { alert(e.message); }
});
laad().catch(e => { $('#lijst').innerHTML = '<div class="leeg">' + esc(e.message) + '</div>'; });
document.body.insertAdjacentHTML('beforeend', '<datalist id="ideeen"></datalist>');
setTimeout(() => { if (D) document.getElementById('ideeen').innerHTML = D.ideeen.map(i => '<option value="' + esc(i) + '">').join(''); }, 800);
</script>
<script src="/shared/metgezel.js" defer></script>
<script src="/shared/basis.js" defer></script>
<script src="/shared/cookie.js" defer></script>
</body>
</html>
