<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>RTF-kantoor</title>
<link rel="icon" href="/icons/foundation.svg">
<link href="/fonts/fonts.css" rel="stylesheet">
<style>
  :root{--bg:#0C0C0B;--card:#151312;--line:rgba(255,255,255,0.10);--txt:#F4F1EC;--muted:rgba(244,241,236,0.68);--soft:rgba(244,241,236,0.55);--burgundy:#C23A5E;--gold:#A98F1C;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;padding-bottom:2rem;}
  h1,h2{font-family:'Bodoni Moda',serif;font-weight:500;}
  header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg),rgba(12,12,11,.86));backdrop-filter:blur(8px);padding:.9rem 1rem .6rem;border-bottom:1px solid var(--line);display:flex;align-items:end;gap:.8rem;}
  header .ey{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--burgundy);}
  header h1{font-size:1.25rem;margin-top:.1rem;}
  header a{margin-left:auto;color:var(--muted);font-size:.78rem;text-decoration:none;}
  main{padding:1rem;max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:.9rem;}
  .kaart{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:.85rem .95rem;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(13.5rem,1fr));gap:.7rem;}
  .kamer{cursor:pointer;}
  .kamer h2{font-size:1rem;}
  .kamer .mi{font-size:.74rem;color:var(--muted);margin:.25rem 0 .4rem;line-height:1.45;}
  .kpi{font-size:.72rem;color:var(--soft);}
  .pil{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--line);border-radius:999px;padding:.15rem .55rem;color:var(--muted);}
  .sec{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);margin:.2rem 0;}
  .rij{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;}
  .veld{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--txt);font:inherit;font-size:.88rem;padding:.55rem .7rem;}
  .knop{background:var(--txt);color:#000;border:none;border-radius:11px;padding:.55rem .9rem;font:inherit;font-weight:600;font-size:.84rem;cursor:pointer;}
  .knop.stil{background:transparent;color:var(--txt);border:1px solid var(--line);font-weight:500;}
  .taak{display:flex;gap:.5rem;align-items:center;padding:.35rem 0;border-bottom:1px solid var(--line);font-size:.85rem;}
  .taak.af span{opacity:.45;text-decoration:line-through;}
  .leeg{color:var(--muted);font-size:.85rem;padding:.5rem 0;}
  ul{list-style:none;} li{font-size:.82rem;line-height:1.6;color:var(--muted);}
  .stat{flex:1;min-width:7rem;text-align:center;} .stat b{font-size:1.2rem;display:block;}
  .stat i{font-style:normal;font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);}
</style>
</head>
<body>
<header>
  <div><div class="ey">RTFoundation</div><h1>RTF-kantoor</h1></div>
  <a href="clubswerk.html">Clubs & steden</a>
  <a href="/apps/lab.html">Onderzoekslab</a>
</header>
<main id="main">
  <div class="kaart"><div class="sec">Het huis in een oogopslag</div><div class="rij" id="top"><div class="leeg">Laden...</div></div></div>
  <div class="grid" id="grid"></div>
  <div id="kamer" hidden>
    <div class="kaart">
      <div class="rij" style="justify-content:space-between;"><h2 id="kNaam" style="font-size:1.1rem;"></h2><button class="knop stil" id="terug">← Alle kamers</button></div>
      <div class="kpi" id="kMissie" style="margin:.3rem 0 .6rem;"></div>
      <div class="rij" id="kKpis"></div>
    </div>
    <div class="kaart" style="margin-top:.7rem;"><div class="sec">Werklijsten</div><div id="kLijsten"></div></div>
    <div class="kaart" style="margin-top:.7rem;">
      <div class="sec">Taken van deze kamer</div>
      <div class="rij" style="margin-bottom:.5rem;"><input class="veld" id="tTekst" placeholder="Nieuwe taak" maxlength="200"><button class="knop" id="tMaak">+</button></div>
      <div id="kTaken"></div>
    </div>
  </div>
</main>
<script>
const $ = s => document.querySelector(s);
const esc = t => String(t==null?'':t).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let TOKEN = null; try { TOKEN = localStorage.getItem('rtg_office_token'); } catch (e) {}
function uitgelogd(){ location.replace('/apps/personeel.html?kantoor=1&terug=' + encodeURIComponent(location.pathname)); }
if (!TOKEN) uitgelogd();
const api = (pad, body) => fetch('/api/rtfkantoor/' + pad, { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN }, body: JSON.stringify(body || {}) })
  .then(async r => { const d = await r.json().catch(() => ({})); if (!r.ok) { if (r.status === 401) uitgelogd(); throw new Error(d.error || 'Er ging iets mis.'); } return d; });
let KAMER = null;
async function laad(){
  const [o, k] = await Promise.all([api('overzicht'), api('kamers')]);
  $('#top').innerHTML =
    '<div class="stat"><b>' + o.kamers + '</b><i>kamers</i></div>' +
    '<div class="stat"><b>€ ' + esc(o.opgehaald) + '</b><i>30%-stroom</i></div>' +
    '<div class="stat"><b>' + o.clubs.actief + '/' + o.clubs.totaal + '</b><i>clubs actief</i></div>' +
    '<div class="stat"><b>' + o.clubs.steden + '</b><i>steden</i></div>' +
    '<div class="stat"><b>' + o.lab.projecten + '</b><i>lab-projecten</i></div>' +
    '<div class="stat"><b>' + o.takenOpen + '</b><i>taken open</i></div>';
  $('#grid').innerHTML = k.kamers.map(x => '<div class="kaart kamer" data-id="' + x.id + '">' +
    '<div class="rij" style="justify-content:space-between;"><h2>' + x.emoji + ' ' + esc(x.naam) + '</h2>' + (x.takenOpen ? '<span class="pil">' + x.takenOpen + ' taken</span>' : '') + '</div>' +
    '<div class="mi">' + esc(x.missie) + '</div>' +
    (x.kpi ? '<div class="kpi">' + esc(x.kpi[0]) + ': <b>' + esc(x.kpi[1]) + '</b></div>' : '') + '</div>').join('');
  document.querySelectorAll('.kamer').forEach(el => el.addEventListener('click', () => open(el.dataset.id)));
}
async function open(id){
  KAMER = id;
  const d = await api('kamer', { id });
  $('#grid').hidden = true; $('#kamer').hidden = false;
  $('#kNaam').textContent = d.emoji + ' ' + d.naam;
  $('#kMissie').textContent = d.missie;
  $('#kKpis').innerHTML = d.kpis.map(k => '<div class="stat"><b>' + esc(k.waarde) + '</b><i>' + esc(k.label) + '</i></div>').join('');
  $('#kLijsten').innerHTML = d.lijsten.map(l => '<div class="sec" style="margin-top:.5rem;">' + esc(l.titel) + '</div>' +
    (l.items.length ? '<ul>' + l.items.map(i => '<li>· ' + esc(i) + '</li>').join('') + '</ul>' : '<div class="leeg">Nu even niets.</div>')).join('') || '<div class="leeg">Geen lijsten.</div>';
  toonTaken(d.taken);
}
function toonTaken(taken){
  $('#kTaken').innerHTML = taken.length ? taken.map(t => '<label class="taak' + (t.af ? ' af' : '') + '"><input type="checkbox" data-id="' + t.id + '"' + (t.af ? ' checked' : '') + '><span>' + esc(t.tekst) + '</span></label>').join('') : '<div class="leeg">Nog geen taken.</div>';
  document.querySelectorAll('#kTaken input').forEach(c => c.addEventListener('change', async () => {
    await api('kamer/taak-zet', { id: KAMER, taakId: c.dataset.id, af: c.checked }); open(KAMER);
  }));
}
$('#terug').addEventListener('click', () => { $('#kamer').hidden = true; $('#grid').hidden = false; laad(); });
$('#tMaak').addEventListener('click', async () => {
  const t = $('#tTekst').value.trim(); if (!t) return;
  const r = await api('kamer/taak', { id: KAMER, tekst: t });
  $('#tTekst').value = ''; toonTaken(r.taken);
});
laad().catch(e => { $('#top').innerHTML = '<div class="leeg">' + esc(e.message) + '</div>'; });
</script>
<script src="/shared/metgezel.js" defer></script>
<script src="/shared/basis.js" defer></script>
<script src="/shared/levendekleur.js" defer></script>
<script src="/shared/cookie.js" defer></script>
</body>
</html>
