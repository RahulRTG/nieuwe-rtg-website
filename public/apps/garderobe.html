<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Garde-robe · Lifestyle Pass</title>
<link rel="icon" href="/icons/partners.svg">
<link href="/fonts/fonts.css" rel="stylesheet">
<style>
  :root{ --bg:#0C0C0B; --card:#151312; --card2:#1B1817; --line:rgba(255,255,255,0.10);
    --txt:#F4F1EC; --muted:rgba(244,241,236,0.68); --soft:rgba(244,241,236,0.5); --burgundy:#C23A5E; --gold:#A98F1C; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;padding-bottom:3rem;}
  h1,h2{font-family:'Bodoni Moda',serif;font-weight:500;letter-spacing:-.01em;}
  header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg),rgba(12,12,11,.86));backdrop-filter:blur(8px);padding:1rem 1.1rem .7rem;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:.8rem;}
  header .ey{font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);}
  header h1{font-size:1.35rem;}
  .terug{margin-left:auto;background:transparent;border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:.4rem .7rem;font:inherit;font-size:.8rem;cursor:pointer;}
  main{padding:1.1rem;max-width:760px;margin:0 auto;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.7rem;margin-bottom:1rem;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:.9rem 1rem;}
  .stat .n{font-family:'Bodoni Moda',serif;font-size:1.5rem;}
  .stat .l{font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);margin-top:.15rem;}
  .kaart{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1rem 1.1rem;margin-bottom:.9rem;}
  .kaart h2{font-size:1.05rem;margin-bottom:.5rem;}
  .veld,select.veld{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--txt);font:inherit;font-size:.9rem;padding:.5rem .7rem;}
  select.veld{appearance:none;}
  .rij{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem;}
  .rij>*{flex:1;min-width:6rem;}
  .knop{background:var(--gold);color:#000;border:none;border-radius:10px;font:inherit;font-weight:600;font-size:.85rem;padding:.5rem 1rem;cursor:pointer;}
  .knop.stil{background:transparent;color:var(--txt);border:1px solid var(--line);font-weight:400;}
  .item{border-top:1px solid var(--line);padding:.55rem 0;display:flex;gap:.6rem;align-items:flex-start;font-size:.9rem;}
  .item:first-child{border-top:0;}
  .item .b{flex:1;min-width:0;}
  .item .b small{color:var(--soft);}
  .cat{font-size:.68rem;padding:.1rem .5rem;border-radius:999px;border:1px solid var(--line);color:var(--muted);white-space:nowrap;text-transform:capitalize;}
  .weg{background:transparent;border:1px solid var(--line);color:var(--soft);border-radius:8px;width:1.8rem;height:1.8rem;cursor:pointer;flex-shrink:0;}
  .weg:hover{border-color:var(--gold);color:var(--txt);}
  .leeg{color:var(--soft);font-size:.86rem;padding:.4rem 0;}
  .melding{position:fixed;left:50%;bottom:1.2rem;transform:translateX(-50%);background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:.6rem 1rem;font-size:.85rem;opacity:0;transition:opacity .3s;z-index:30;pointer-events:none;}
  .inlog{text-align:center;padding:2.5rem 1rem;}
</style>
<link href="/shared/rtg-uniform.css" rel="stylesheet">
</head>
<body>
<header><div><div class="ey">Lifestyle Pass</div><h1>Garde-robe</h1></div><a class="terug" href="/apps/app.html?pas=lifestyle">← app</a></header>
<main id="main"><div class="leeg">Laden…</div></main>
<div class="melding" id="melding"></div>
<script>
const $=s=>document.querySelector(s);
const esc=t=>String(t==null?'':t).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let TOKEN=null; try{ TOKEN=localStorage.getItem('rtg_member_token'); }catch(e){}
function meld(t){ const m=$('#melding'); m.textContent=t; m.style.opacity='1'; clearTimeout(m._t); m._t=setTimeout(()=>m.style.opacity='0',2600); }
const api=(pad,body)=>fetch('/api/member/rechterhand/'+pad,{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+TOKEN},body:JSON.stringify(body||{})}).then(async r=>{const d=await r.json().catch(()=>({}));if(!r.ok){const e=new Error(d.error||'Er ging iets mis.');e.status=r.status;throw e;}return d;});
const AIBOX=app=>'<div class="kaart"><h2>🤝 Vraag de stylist</h2><div style="display:flex;gap:.5rem;"><input class="veld" id="aiV" style="flex:1;" placeholder="'+app+'"><button class="knop" id="aiK">Vraag</button></div><div id="aiA" style="margin-top:.6rem;font-size:.92rem;line-height:1.55;color:var(--muted);"></div></div>';
function bindAi(app){ const k=$('#aiK'); if(!k)return; k.onclick=async()=>{ const v=$('#aiV').value.trim(); if(!v)return; $('#aiA').textContent='Een ogenblik…'; try{ const r=await api('ai',{app,vraag:v}); $('#aiA').textContent=r.antwoord; $('#aiV').value=''; }catch(e){ $('#aiA').textContent=e.message; } }; $('#aiV').addEventListener('keydown',e=>{ if(e.key==='Enter') k.click(); }); }
async function laad(){
  if(!TOKEN){ $('#main').innerHTML='<div class="inlog"><h2>Log eerst in</h2></div>'; return; }
  let d; try{ d=await api('garderobe'); }catch(e){ if(e.status===403){ $('#main').innerHTML='<div class="inlog"><h2>Alleen met de Lifestyle Pass</h2><p style="color:var(--muted);margin-top:.6rem;">Garde-robe is onderdeel van de Lifestyle Pass.</p></div>'; return; } $('#main').innerHTML='<div class="leeg">Kon de garderobe niet laden.</div>'; return; }
  const catOpts=d.categorieen.map(c=>'<option>'+c+'</option>').join('');
  const vakOpts=d.vakken.map(v=>'<option>'+v+'</option>').join('');
  let h='<div class="grid"><div class="stat"><div class="n">'+d.aantal+'</div><div class="l">Stuks</div></div><div class="stat"><div class="n">'+Object.keys(d.perCategorie).length+'</div><div class="l">Categorieën</div></div><div class="stat"><div class="n">'+d.vaklui.length+'</div><div class="l">Vaklui</div></div></div>';
  // stukken
  h+='<div class="kaart"><h2>👔 Uw garderobe</h2><div id="stukken">'+(d.stukken.length?d.stukken.map(s=>'<div class="item"><div class="b"><b>'+esc(s.naam)+'</b> <small>'+[esc(s.merk),esc(s.kleur),s.maat?'maat '+esc(s.maat):'',esc(s.waar)].filter(Boolean).join(' · ')+'</small></div><span class="cat">'+esc(s.categorie)+'</span><button class="weg" data-stuk="'+s.id+'">×</button></div>').join(''):'<div class="leeg">Nog niets in de garderobe.</div>')+'</div>'
    +'<div class="rij"><input class="veld" id="sN" placeholder="wat"><select class="veld" id="sC">'+catOpts+'</select></div><div class="rij"><input class="veld" id="sM" placeholder="merk"><input class="veld" id="sK" placeholder="kleur"><input class="veld" id="sMa" placeholder="maat"></div><div class="rij"><input class="veld" id="sW" placeholder="waar het hangt/ligt"></div><div style="margin-top:.5rem;"><button class="knop" id="sAdd">+ toevoegen</button></div></div>';
  // vaklui
  h+='<div class="kaart"><h2>✂️ Vaklui</h2><div id="vaklui">'+(d.vaklui.length?d.vaklui.map(v=>'<div class="item"><div class="b"><b>'+esc(v.naam)+'</b> <small>'+[esc(v.vak),esc(v.plaats),esc(v.telefoon)].filter(Boolean).join(' · ')+'</small></div><button class="weg" data-vak="'+v.id+'">×</button></div>').join(''):'<div class="leeg">Nog geen vaklui.</div>')+'</div>'
    +'<div class="rij"><input class="veld" id="vN" placeholder="naam/atelier"><select class="veld" id="vV">'+vakOpts+'</select></div><div class="rij"><input class="veld" id="vP" placeholder="plaats"><input class="veld" id="vT" placeholder="telefoon"></div><div style="margin-top:.5rem;"><button class="knop stil" id="vAdd">+ vakman</button></div></div>';
  h+=AIBOX('Bijv. wat draag ik bij een diner in Ibiza?');
  $('#main').innerHTML=h;
  bindAi('garderobe');
  $('#sAdd').onclick=async()=>{ const naam=$('#sN').value.trim(); if(!naam) return meld('Welk stuk?'); try{ await api('garderobe/stuk',{naam,categorie:$('#sC').value,merk:$('#sM').value,kleur:$('#sK').value,maat:$('#sMa').value,waar:$('#sW').value}); laad(); }catch(e){ meld(e.message); } };
  $('#vAdd').onclick=async()=>{ const naam=$('#vN').value.trim(); if(!naam) return meld('Naam?'); try{ await api('garderobe/vakman',{naam,vak:$('#vV').value,plaats:$('#vP').value,telefoon:$('#vT').value}); laad(); }catch(e){ meld(e.message); } };
  document.querySelectorAll('[data-stuk]').forEach(b=> b.onclick=async()=>{ try{ await api('garderobe/stuk/weg',{id:b.dataset.stuk}); laad(); }catch(e){ meld(e.message); } });
  document.querySelectorAll('[data-vak]').forEach(b=> b.onclick=async()=>{ try{ await api('garderobe/vakman/weg',{id:b.dataset.vak}); laad(); }catch(e){ meld(e.message); } });
}
laad();
</script>
<script src="/shared/schermbeeld.js" defer></script>
<script src="/shared/metgezel.js" defer></script>
<script src="/shared/basis.js" defer></script>
<script src="/shared/cookie.js" defer></script>
</body>
</html>
