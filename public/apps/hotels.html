<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>RTG Verblijven</title>
<link rel="icon" href="/icons/partners.svg">
<link href="/fonts/fonts.css" rel="stylesheet">
<style>
  :root{
    --bg:#0C0C0B; --card:#151312; --card2:#1B1817; --line:rgba(255,255,255,0.10);
    --txt:#F4F1EC; --muted:rgba(244,241,236,0.68); --soft:rgba(244,241,236,0.5);
    --burgundy:#C23A5E; --gold:#A98F1C; --green:#4C9A75;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;padding-bottom:3rem;}
  h1,h2,h3{font-family:'Bodoni Moda',serif;font-weight:500;letter-spacing:-.01em;}
  a{color:inherit;}
  header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg),rgba(12,12,11,.86));backdrop-filter:blur(8px);padding:1rem 1.1rem .7rem;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:.8rem;}
  header .ey{font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);}
  header h1{font-size:1.4rem;margin-top:.05rem;}
  .terug{background:transparent;border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:.4rem .7rem;font:inherit;font-size:.8rem;cursor:pointer;}
  main{padding:1.1rem;max-width:900px;margin:0 auto;}
  .chips{display:flex;gap:.4rem;overflow-x:auto;padding:.2rem 0 .6rem;}
  .chip{white-space:nowrap;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:.35rem .8rem;font-size:.8rem;color:var(--txt);cursor:pointer;}
  .chip.aan{background:var(--gold);color:#000;border-color:var(--gold);}
  .lijst{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.9rem;margin-top:.6rem;}
  .resto{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1rem;cursor:pointer;transition:border-color .2s,transform .2s;display:flex;flex-direction:column;gap:.3rem;text-align:left;}
  .resto:hover{border-color:var(--gold);transform:translateY(-2px);}
  .resto h3{font-size:1.08rem;}
  .resto .meta{font-size:.74rem;color:var(--soft);letter-spacing:.04em;text-transform:uppercase;}
  .resto .tag{font-size:.84rem;color:var(--muted);line-height:1.5;}
  .vanaf{display:inline-block;margin-top:.2rem;font-size:.78rem;color:var(--gold);font-variant-numeric:tabular-nums;}
  .leeg{color:var(--muted);font-size:.9rem;padding:2rem 0;text-align:center;}
  .blad{position:fixed;inset:0;z-index:20;background:var(--bg);overflow-y:auto;display:none;}
  .blad.open{display:block;}
  .blad-kop{position:sticky;top:0;background:linear-gradient(180deg,var(--bg),rgba(12,12,11,.9));backdrop-filter:blur(8px);padding:1rem 1.1rem .7rem;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:.8rem;}
  .paneel{max-width:560px;margin:0 auto;padding:1.1rem;}
  .veld{background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--txt);font:inherit;font-size:.9rem;padding:.55rem .7rem;}
  .rij{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;}
  .lbl{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);margin-bottom:.25rem;}
  .step{display:flex;align-items:center;gap:.5rem;}
  .step button{width:2.2rem;height:2.2rem;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--txt);font-size:1.1rem;cursor:pointer;}
  .sec{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);margin:1.1rem 0 .5rem;}
  .kamer{border:1px solid var(--line);background:var(--card);border-radius:12px;padding:.7rem .8rem;margin-bottom:.5rem;cursor:pointer;display:flex;flex-direction:column;gap:.15rem;text-align:left;width:100%;color:var(--txt);}
  .kamer.aan{border-color:var(--gold);}
  .kamer .kn{font-size:.96rem;font-family:'Bodoni Moda',serif;}
  .kamer .kd{font-size:.78rem;color:var(--muted);}
  .kamer .kp{font-size:.82rem;color:var(--gold);font-variant-numeric:tabular-nums;}
  .knop{width:100%;margin-top:1rem;background:var(--gold);color:#000;border:none;border-radius:12px;padding:.8rem;font:inherit;font-weight:600;font-size:.95rem;cursor:pointer;}
  .knop:disabled{opacity:.4;cursor:not-allowed;}
  .melding{position:fixed;left:50%;bottom:1.2rem;transform:translateX(-50%);background:#000;border:1px solid var(--gold);color:var(--txt);padding:.55rem .9rem;border-radius:10px;font-size:.82rem;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90%;z-index:30;}
  .inlog{max-width:420px;margin:4rem auto;text-align:center;padding:0 1.2rem;}
  .inlog a{color:var(--gold);border-bottom:1px solid var(--gold);}
</style>
</head>
<body>
<header>
  <a class="terug" href="/apps/app.html">← App</a>
  <div><div class="ey">Boek een verblijf</div><h1>RTG Verblijven</h1></div>
</header>
<main id="main">
  <p style="color:var(--muted);font-size:.9rem;line-height:1.6;max-width:60ch;">Hotels, appartementen en villa's van RTG-partners. Kies een adres, een kamer en je data. Je vraagt het verblijf aan; het huis bevestigt.</p>
  <div class="chips" id="soorten"></div>
  <div class="lijst" id="lijst"></div>
  <div id="mijnWrap"></div>
</main>

<section class="blad" id="blad" aria-label="Verblijf boeken">
  <div class="blad-kop">
    <button class="terug" id="bladTerug">← Verblijven</button>
    <div><div class="ey" id="bladMeta" style="font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);"></div><h1 id="bladNaam" style="font-family:'Bodoni Moda',serif;font-size:1.3rem;"></h1></div>
  </div>
  <div class="paneel">
    <div class="sec">Kies een kamer</div>
    <div id="kamers"></div>
    <div class="rij" style="margin-top:.6rem;gap:1rem;align-items:flex-end;">
      <div><div class="lbl">Aankomst</div><input class="veld" id="rAan" type="date"></div>
      <div><div class="lbl">Vertrek</div><input class="veld" id="rVer" type="date"></div>
      <div><div class="lbl">Gasten</div><div class="step"><button type="button" id="rMin">−</button><span id="rAantal" style="min-width:2.5rem;text-align:center;font-size:1.05rem;">2</span><button type="button" id="rPlus">+</button></div></div>
    </div>
    <div id="rTotaal" style="margin-top:.8rem;font-size:.86rem;color:var(--muted);"></div>
    <button class="knop" id="rBoek" disabled>Kies eerst een kamer</button>
  </div>
</section>

<div class="melding" id="melding" role="status"></div>
<script>
const $ = s => document.querySelector(s);
const esc = t => String(t==null?'':t).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let TOKEN = null; try { TOKEN = localStorage.getItem('rtg_member_token'); } catch (e) {}
function meld(t){ const m = $('#melding'); m.textContent = t; m.style.opacity = '1'; clearTimeout(m._t); m._t = setTimeout(() => m.style.opacity = '0', 2800); }
const api = (pad, body) => fetch(pad, {
  method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN },
  body: JSON.stringify(body || {})
}).then(async r => { const d = await r.json().catch(() => ({})); if (!r.ok) throw new Error(d.error || 'Er ging iets mis.'); return d; });

if (!TOKEN) {
  $('#main').innerHTML = '<div class="inlog"><h2 style="font-family:\'Bodoni Moda\',serif;">Log eerst in</h2>'+
    '<p style="color:var(--muted);margin-top:.6rem;line-height:1.6;">Verblijven boek je als lid. Open de app en log in met je RTG-account.</p>'+
    '<p style="margin-top:1rem;"><a href="/apps/app.html">Naar de app →</a></p></div>';
} else { laad(); }

let ALLE = [], soort = '';
const SOORTEN = [['','Alle'],['hotel','Hotels'],['apartment','Appartementen'],['villa',"Villa's"]];
async function laad(){
  let d;
  try { d = await api('/api/hotels'); } catch(e){ $('#lijst').innerHTML = '<div class="leeg">'+esc(e.message)+'</div>'; return; }
  ALLE = d.huizen || [];
  $('#soorten').innerHTML = SOORTEN.map(([k,l]) => '<button class="chip'+(soort===k?' aan':'')+'" data-k="'+esc(k)+'">'+esc(l)+'</button>').join('');
  $('#soorten').querySelectorAll('.chip').forEach(b => b.addEventListener('click', () => { soort = b.dataset.k; teken(); }));
  teken();
  laadMijn();
}
async function laadMijn(){
  let d; try { d = await api('/api/verblijf/mijn'); } catch(e){ return; }
  const open = (d.verblijven||[]).filter(v => ['aangevraagd','bevestigd'].includes(v.status));
  if (!open.length){ $('#mijnWrap').innerHTML = ''; return; }
  $('#mijnWrap').innerHTML = '<h2 style="font-family:\'Bodoni Moda\',serif;font-size:1.1rem;margin:2rem 0 .8rem;border-top:1px solid var(--line);padding-top:1.4rem;">Mijn verblijven</h2>'+
    open.map(v => '<div class="resto" style="cursor:default;flex-direction:row;justify-content:space-between;align-items:center;">'+
      '<div><h3 style="font-size:1rem;">'+esc(v.supplierName)+'</h3><span class="meta">'+esc(v.roomName)+' · '+esc(v.aankomst)+' tot '+esc(v.vertrek)+' · '+esc(v.status)+'</span></div>'+
      '<button class="knop" data-id="'+esc(v.id)+'" style="width:auto;margin:0;padding:.45rem .8rem;background:transparent;border:1px solid var(--line);color:var(--txt);">Annuleer</button>'+
    '</div>').join('');
  $('#mijnWrap').querySelectorAll('button[data-id]').forEach(b => b.addEventListener('click', async () => {
    try { await api('/api/verblijf/annuleer', { id: b.dataset.id }); meld('Verblijf geannuleerd.'); laadMijn(); } catch(e){ meld(e.message); }
  }));
}
function teken(){
  const lijst = ALLE.filter(h => !soort || h.soort === soort);
  $('#lijst').innerHTML = lijst.length ? lijst.map(h =>
    '<button class="resto" data-code="'+esc(h.code)+'">'+
      '<span class="meta">'+esc(h.soortLabel)+(h.stad?' · '+esc(h.stad):'')+'</span>'+
      '<h3>'+esc(h.naam)+'</h3>'+
      (h.tagline?'<span class="tag">'+esc(h.tagline)+'</span>':'')+
      (h.vanaf!=null?'<span class="vanaf">Vanaf € '+esc(h.vanaf)+' per nacht</span>':'')+
    '</button>').join('') : '<div class="leeg">Geen adressen in deze categorie.</div>';
  $('#lijst').querySelectorAll('.resto').forEach(b => b.addEventListener('click', () => openHuis(b.dataset.code)));
}

let HUIS = null, KAMER = null, AANTAL = 2;
function openHuis(code){
  HUIS = ALLE.find(h => h.code === code); if (!HUIS) return;
  KAMER = null; AANTAL = 2;
  $('#bladNaam').textContent = HUIS.naam;
  $('#bladMeta').textContent = HUIS.soortLabel;
  $('#rAantal').textContent = AANTAL;
  $('#kamers').innerHTML = HUIS.kamers.map(k =>
    '<button class="kamer" data-id="'+esc(k.id)+'"><span class="kn">'+esc(k.naam)+'</span>'+
    (k.omschrijving?'<span class="kd">'+esc(k.omschrijving)+'</span>':'')+
    '<span class="kp">€ '+esc(k.prijs)+' per nacht</span></button>').join('');
  $('#kamers').querySelectorAll('.kamer').forEach(b => b.addEventListener('click', () => {
    KAMER = HUIS.kamers.find(k => k.id === b.dataset.id);
    $('#kamers').querySelectorAll('.kamer').forEach(x => x.classList.remove('aan'));
    b.classList.add('aan'); herbereken();
  }));
  const t = new Date(); const iso = t.toISOString().slice(0,10);
  const morgen = new Date(Date.now()+86400000).toISOString().slice(0,10);
  $('#rAan').min = iso; $('#rAan').value = iso;
  $('#rVer').min = morgen; $('#rVer').value = morgen;
  $('#rTotaal').textContent = ''; $('#rBoek').disabled = true; $('#rBoek').textContent = 'Kies eerst een kamer';
  $('#blad').classList.add('open');
}
function nachten(){ const a = new Date($('#rAan').value), v = new Date($('#rVer').value); const n = Math.round((v-a)/86400000); return n>0?n:0; }
function herbereken(){
  if (!KAMER){ $('#rBoek').disabled = true; $('#rBoek').textContent = 'Kies eerst een kamer'; $('#rTotaal').textContent=''; return; }
  const n = nachten();
  if (n<1){ $('#rBoek').disabled = true; $('#rBoek').textContent = 'Kies geldige data'; $('#rTotaal').textContent=''; return; }
  const tot = KAMER.prijs * n;
  $('#rTotaal').textContent = KAMER.naam + ' · ' + n + ' nacht' + (n>1?'en':'') + ' · € ' + tot + ' totaal';
  $('#rBoek').disabled = false; $('#rBoek').textContent = 'Verblijf aanvragen';
}
async function boek(){
  if (!KAMER) return;
  try {
    await api('/api/verblijf', { supplierCode: HUIS.code, roomId: KAMER.id, aankomst: $('#rAan').value, vertrek: $('#rVer').value, personen: AANTAL });
    $('#blad').classList.remove('open');
    meld('Verblijf aangevraagd bij ' + HUIS.naam + '. Het huis bevestigt het.');
  } catch(e){ meld(e.message); }
}
$('#bladTerug').addEventListener('click', () => $('#blad').classList.remove('open'));
$('#rAan').addEventListener('change', herbereken);
$('#rVer').addEventListener('change', herbereken);
$('#rMin').addEventListener('click', () => { AANTAL = Math.max(1, AANTAL-1); $('#rAantal').textContent = AANTAL; });
$('#rPlus').addEventListener('click', () => { AANTAL = Math.min(10, AANTAL+1); $('#rAantal').textContent = AANTAL; });
$('#rBoek').addEventListener('click', boek);
</script>
<button class="rahulfab" id="rahulFab" type="button">✨ Vraag Rahul</button>
<section class="rahulsheet" id="rahulSheet" aria-label="Vraag Rahul" hidden>
  <div class="rahulkop"><b>Vraag het Rahul</b><button class="terug" id="rahulSluit" type="button" aria-label="Sluiten">✕</button></div>
  <div class="rahuluit" id="rahulUit" aria-live="polite"></div>
  <form class="rahulrij" id="rahulForm"><input id="rahulIn" placeholder="Bijv. boek Ibiza voor 2 personen" autocomplete="off" maxlength="300" aria-label="Vraag of opdracht"><button class="rahulgo" type="submit" aria-label="Versturen">→</button></form>
</section>
<style>
.rahulfab{position:fixed;right:1rem;bottom:1rem;z-index:35;background:var(--gold);color:#000;border:none;border-radius:999px;padding:.7rem 1.1rem;font-family:'Inter',system-ui,sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.4);}
.rahulsheet{position:fixed;right:1rem;bottom:1rem;z-index:36;width:min(360px,92vw);background:var(--card,#151312);border:1px solid var(--gold);border-radius:16px;padding:.9rem;display:flex;flex-direction:column;gap:.6rem;box-shadow:0 10px 30px rgba(0,0,0,.5);}
.rahulsheet[hidden]{display:none;}
.rahulkop{display:flex;align-items:center;justify-content:space-between;}
.rahulkop b{font-family:'Bodoni Moda',serif;font-weight:500;font-size:1rem;}
.rahulkop .terug{padding:.2rem .55rem;}
.rahuluit{font-size:.86rem;color:var(--muted,#bbb);line-height:1.55;max-height:40vh;overflow-y:auto;white-space:pre-wrap;}
.rahulrij{display:flex;gap:.4rem;}
.rahulrij input{flex:1;background:var(--bg,#0C0C0B);border:1px solid var(--line,#333);border-radius:10px;color:var(--txt,#eee);font:inherit;font-size:.86rem;padding:.5rem .7rem;}
.rahulgo{background:var(--gold);color:#000;border:none;border-radius:10px;padding:.5rem .9rem;font-weight:700;cursor:pointer;}
</style>
<script>(function(){
  var tok=null; try{tok=localStorage.getItem('rtg_member_token');}catch(e){}
  var fab=document.getElementById('rahulFab'), sheet=document.getElementById('rahulSheet');
  var uit=document.getElementById('rahulUit'), form=document.getElementById('rahulForm'), inp=document.getElementById('rahulIn');
  if(!tok){ if(fab) fab.style.display='none'; return; }
  fab.addEventListener('click',function(){ sheet.hidden=false; fab.style.display='none'; inp.focus(); if(!uit.textContent) uit.textContent='Zeg wat je wilt. Ik reserveer, boek, meld je aan en bestel, alles met jouw eigen inlog.'; });
  document.getElementById('rahulSluit').addEventListener('click',function(){ sheet.hidden=true; fab.style.display=''; });
  form.addEventListener('submit',function(ev){ ev.preventDefault(); var q=inp.value.trim(); if(!q) return; inp.value=''; uit.textContent='Rahul denkt na...';
    fetch('/api/fluister',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+tok},body:JSON.stringify({q:q})})
      .then(function(r){return r.json();}).then(function(d){ uit.textContent=(d&&(d.antwoord||d.error))||'Ik kwam er niet uit.'; })
      .catch(function(){ uit.textContent='Er ging iets mis. Probeer het opnieuw.'; });
  });
})();</script>

</body>
</html>
