<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Maison · Lifestyle Pass</title>
<link rel="icon" href="/icons/partners.svg">
<link href="/fonts/fonts.css" rel="stylesheet">
<style>
  :root{ --bg:#0C0C0B; --card:#151312; --card2:#1B1817; --line:rgba(255,255,255,0.10);
    --txt:#F4F1EC; --muted:rgba(244,241,236,0.68); --soft:rgba(244,241,236,0.5); --burgundy:#C23A5E; --gold:#A98F1C; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;padding-bottom:3rem;}
  h1,h2{font-family:'Bodoni Moda',serif;font-weight:500;letter-spacing:-.01em;}
  header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg),rgba(12,12,11,.86));backdrop-filter:blur(8px);padding:1rem 1.1rem .7rem;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:.8rem;}
  header .ey{font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);}
  header h1{font-size:1.35rem;}
  .terug{margin-left:auto;background:transparent;border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:.4rem .7rem;font:inherit;font-size:.8rem;cursor:pointer;}
  main{padding:1.1rem;max-width:760px;margin:0 auto;}
  .kaart{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1rem 1.1rem;margin-bottom:.9rem;}
  .kaart h2{font-size:1.05rem;margin-bottom:.5rem;}
  .veld{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--txt);font:inherit;font-size:.9rem;padding:.5rem .7rem;}
  select.veld{appearance:none;}
  .rij{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem;}
  .rij>*{flex:1;min-width:6rem;}
  .knop{background:transparent;color:var(--txt);border:1px solid var(--line);border-radius:10px;font:inherit;font-size:.82rem;padding:.45rem .9rem;cursor:pointer;}
  .knop:hover{border-color:var(--gold);}
  .item{border-top:1px solid var(--line);padding:.55rem 0;display:flex;gap:.6rem;align-items:flex-start;font-size:.9rem;}
  .item:first-child{border-top:0;}
  .item .b{flex:1;min-width:0;}
  .item .b small{color:var(--soft);}
  .item.klaar .b b{text-decoration:line-through;color:var(--soft);}
  .vink{width:1.3rem;height:1.3rem;accent-color:var(--gold);flex-shrink:0;margin-top:.1rem;}
  .weg{background:transparent;border:1px solid var(--line);color:var(--soft);border-radius:8px;width:1.8rem;height:1.8rem;cursor:pointer;flex-shrink:0;}
  .weg:hover{border-color:var(--gold);color:var(--txt);}
  .leeg{color:var(--soft);font-size:.86rem;padding:.4rem 0;}
  .melding{position:fixed;left:50%;bottom:1.2rem;transform:translateX(-50%);background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:.6rem 1rem;font-size:.85rem;opacity:0;transition:opacity .3s;z-index:30;pointer-events:none;}
  .inlog{text-align:center;padding:2.5rem 1rem;}
</style>
<link href="/shared/rtg-uniform.css" rel="stylesheet">
</head>
<body>
<header><div><div class="ey">Lifestyle Pass</div><h1>Maison</h1></div><a class="terug" href="/apps/app.html?pas=lifestyle">← app</a></header>
<main id="main"><div class="leeg">Laden…</div></main>
<div class="melding" id="melding"></div>
<script>
const $=s=>document.querySelector(s);
const esc=t=>String(t==null?'':t).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let TOKEN=null; try{ TOKEN=localStorage.getItem('rtg_member_token'); }catch(e){}
function meld(t){ const m=$('#melding'); m.textContent=t; m.style.opacity='1'; clearTimeout(m._t); m._t=setTimeout(()=>m.style.opacity='0',2600); }
const api=(pad,body)=>fetch('/api/member/rechterhand/'+pad,{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+TOKEN},body:JSON.stringify(body||{})}).then(async r=>{const d=await r.json().catch(()=>({}));if(!r.ok){const e=new Error(d.error||'Er ging iets mis.');e.status=r.status;throw e;}return d;});
const MND=['','jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
const dt=d=>{ if(!d)return ''; const[y,m,dd]=d.split('-'); return Number(dd)+' '+MND[Number(m)]; };
const AIBOX=app=>'<div class="kaart"><h2>🤝 Vraag de huismeester</h2><div style="display:flex;gap:.5rem;"><input class="veld" id="aiV" style="flex:1;" placeholder="'+app+'"><button class="knop" id="aiK" style="background:var(--gold);color:#000;border-color:var(--gold);font-weight:600;">Vraag</button></div><div id="aiA" style="margin-top:.6rem;font-size:.92rem;line-height:1.55;color:var(--muted);"></div></div>';
function bindAi(app){ const k=$('#aiK'); if(!k)return; k.onclick=async()=>{ const v=$('#aiV').value.trim(); if(!v)return; $('#aiA').textContent='Een ogenblik…'; try{ const r=await api('ai',{app,vraag:v}); $('#aiA').textContent=r.antwoord; $('#aiV').value=''; }catch(e){ $('#aiA').textContent=e.message; } }; $('#aiV').addEventListener('keydown',e=>{ if(e.key==='Enter') k.click(); }); }
async function laad(){
  if(!TOKEN){ $('#main').innerHTML='<div class="inlog"><h2>Log eerst in</h2></div>'; return; }
  let d; try{ d=await api('maison'); }catch(e){ if(e.status===403){ $('#main').innerHTML='<div class="inlog"><h2>Alleen met de Lifestyle Pass</h2><p style="color:var(--muted);margin-top:.6rem;">Maison is onderdeel van de Lifestyle Pass.</p></div>'; return; } $('#main').innerHTML='<div class="leeg">Kon Maison niet laden.</div>'; return; }
  let h='';
  // staf
  h+='<div class="kaart"><h2>👤 Personeel</h2><div id="staf">'+(d.staf.length?d.staf.map(s=>'<div class="item"><div class="b"><b>'+esc(s.naam)+'</b> <small>'+[esc(s.rol),esc(s.telefoon)].filter(Boolean).join(' · ')+'</small></div><button class="weg" data-staf="'+s.id+'">×</button></div>').join(''):'<div class="leeg">Nog geen personeel.</div>')+'</div>'
    +'<div class="rij"><input class="veld" id="sN" placeholder="naam"><input class="veld" id="sR" placeholder="rol"><input class="veld" id="sT" placeholder="telefoon"></div><div style="margin-top:.5rem;"><button class="knop" id="sAdd">+ toevoegen</button></div></div>';
  // taken
  const opts='<option value="">iedereen</option>'+d.staf.map(s=>'<option value="'+s.id+'">'+esc(s.naam)+'</option>').join('');
  h+='<div class="kaart"><h2>✅ Taken <small style="font-size:.75rem;color:var(--soft);">('+d.openTaken+' open)</small></h2><div id="taken">'+(d.taken.length?d.taken.map(t=>'<div class="item'+(t.klaar?' klaar':'')+'"><input type="checkbox" class="vink" data-taak="'+t.id+'"'+(t.klaar?' checked':'')+'><div class="b"><b>'+esc(t.wat)+'</b> <small>'+[t.voorNaam,t.dag?dt(t.dag):''].filter(Boolean).join(' · ')+'</small></div><button class="weg" data-taakweg="'+t.id+'">×</button></div>').join(''):'<div class="leeg">Geen taken.</div>')+'</div>'
    +'<div class="rij"><input class="veld" id="tW" placeholder="wat moet er gebeuren"><select class="veld" id="tV">'+opts+'</select><input class="veld" id="tD" type="date"></div><div style="margin-top:.5rem;"><button class="knop" id="tAdd">+ taak</button></div></div>';
  // logboek
  h+='<div class="kaart"><h2>📓 Logboek</h2><div class="rij" style="margin-top:0;"><input class="veld" id="lT" placeholder="Wat speelt er in en om huis?"><button class="knop" id="lAdd">Noteren</button></div><div id="log" style="margin-top:.6rem;">'+(d.logboek.length?d.logboek.map(l=>'<div class="item"><div class="b">'+esc(l.tekst)+'</div><button class="weg" data-logweg="'+l.id+'">×</button></div>').join(''):'<div class="leeg">Nog niets genoteerd.</div>')+'</div></div>';
  h+=AIBOX('Bijv. hoe plan ik de week voor de staf?');
  $('#main').innerHTML=h;
  bindAi('maison');
  $('#sAdd').onclick=async()=>{ const naam=$('#sN').value.trim(); if(!naam) return meld('Naam?'); try{ await api('maison/staf',{naam,rol:$('#sR').value,telefoon:$('#sT').value}); laad(); }catch(e){ meld(e.message); } };
  $('#tAdd').onclick=async()=>{ const wat=$('#tW').value.trim(); if(!wat) return meld('Wat moet er gebeuren?'); try{ await api('maison/taak',{wat,voor:$('#tV').value,dag:$('#tD').value}); laad(); }catch(e){ meld(e.message); } };
  $('#lAdd').onclick=async()=>{ const t=$('#lT').value.trim(); if(!t) return; try{ await api('maison/log',{tekst:t}); laad(); }catch(e){ meld(e.message); } };
  document.querySelectorAll('[data-staf]').forEach(b=> b.onclick=async()=>{ try{ await api('maison/staf/weg',{id:b.dataset.staf}); laad(); }catch(e){ meld(e.message); } });
  document.querySelectorAll('[data-taak]').forEach(c=> c.addEventListener('change',async()=>{ try{ await api('maison/taak/klaar',{id:c.dataset.taak,klaar:c.checked}); laad(); }catch(e){ meld(e.message); } }));
  document.querySelectorAll('[data-taakweg]').forEach(b=> b.onclick=async()=>{ try{ await api('maison/taak/weg',{id:b.dataset.taakweg}); laad(); }catch(e){ meld(e.message); } });
  document.querySelectorAll('[data-logweg]').forEach(b=> b.onclick=async()=>{ try{ await api('maison/log/weg',{id:b.dataset.logweg}); laad(); }catch(e){ meld(e.message); } });
}
laad();
</script>
<script src="/shared/schermbeeld.js" defer></script>
<script src="/shared/metgezel.js" defer></script>
<script src="/shared/basis.js" defer></script>
</body>
</html>
