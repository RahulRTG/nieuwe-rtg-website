<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>RTG Mall</title>
<link rel="icon" href="/icons/partners.svg">
<link href="/fonts/fonts.css" rel="stylesheet">
<style>
  :root{
    --bg:#0C0C0B; --card:#151312; --card2:#1B1817; --line:rgba(255,255,255,0.10);
    --txt:#F4F1EC; --muted:rgba(244,241,236,0.68); --soft:rgba(244,241,236,0.5);
    --burgundy:#C23A5E; --gold:#A98F1C;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;padding-bottom:3rem;}
  h1,h2,h3{font-family:'Bodoni Moda',serif;font-weight:500;letter-spacing:-.01em;}
  a{color:inherit;}
  header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg),rgba(12,12,11,.86));backdrop-filter:blur(8px);padding:1rem 1.1rem .7rem;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:.8rem;}
  header .ey{font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);}
  header h1{font-size:1.4rem;margin-top:.05rem;}
  .terug{background:transparent;border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:.4rem .7rem;font:inherit;font-size:.8rem;cursor:pointer;}
  main{padding:1.1rem;max-width:960px;margin:0 auto;}
  .etage{margin-top:1.8rem;}
  .etage-kop{display:flex;align-items:baseline;gap:.6rem;border-bottom:1px solid var(--line);padding-bottom:.5rem;margin-bottom:1rem;}
  .etage-kop h2{font-size:1.15rem;}
  .etage-kop .n{font-size:.72rem;color:var(--soft);letter-spacing:.1em;text-transform:uppercase;}
  .boutieks{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:.9rem;}
  .boutiek{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1rem;cursor:pointer;transition:border-color .2s,transform .2s;display:flex;flex-direction:column;gap:.35rem;text-align:left;}
  .boutiek:hover{border-color:var(--gold);transform:translateY(-2px);}
  .boutiek h3{font-size:1.05rem;}
  .boutiek .stad{font-size:.7rem;color:var(--soft);letter-spacing:.08em;text-transform:uppercase;}
  .boutiek .tag{font-size:.82rem;color:var(--muted);line-height:1.5;margin-top:.15rem;}
  .boutiek .meta{font-size:.76rem;color:var(--soft);margin-top:.35rem;}
  .leeg{color:var(--muted);font-size:.9rem;padding:2rem 0;text-align:center;}
  /* gids: alle leveranciers per genre, met een diepe link naar boeken/reserveren */
  .gids{margin-top:2.4rem;}
  .genres{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.7rem;}
  .genre{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:.85rem .95rem;display:flex;gap:.7rem;align-items:flex-start;text-decoration:none;color:var(--txt);transition:border-color .2s,transform .2s;}
  .genre:hover{border-color:var(--gold);transform:translateY(-2px);}
  .genre .gi{font-size:1.3rem;line-height:1;}
  .genre b{font-family:'Bodoni Moda',serif;font-weight:500;font-size:1rem;display:block;}
  .genre .gn{font-size:.7rem;color:var(--soft);letter-spacing:.08em;text-transform:uppercase;}
  .genre .gl{font-size:.8rem;color:var(--muted);line-height:1.45;display:block;margin-top:.25rem;}
  .genre .ga{font-size:.72rem;color:var(--gold);display:block;margin-top:.3rem;}
  /* boutiek-blad */
  .blad{position:fixed;inset:0;z-index:20;background:var(--bg);overflow-y:auto;display:none;}
  .blad.open{display:block;}
  .blad-kop{position:sticky;top:0;background:linear-gradient(180deg,var(--bg),rgba(12,12,11,.9));backdrop-filter:blur(8px);padding:1rem 1.1rem .7rem;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:.8rem;}
  .art{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.9rem;padding:1.1rem;max-width:960px;margin:0 auto;}
  .kaart{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:.9rem;display:flex;flex-direction:column;gap:.3rem;}
  .kaart .cat{font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);}
  .kaart h3{font-size:1rem;}
  .kaart .mat{font-size:.78rem;color:var(--soft);}
  .kaart .oms{font-size:.82rem;color:var(--muted);line-height:1.5;}
  .kaart .prijs{font-size:.95rem;margin-top:.2rem;}
  .kaart .opties{font-size:.74rem;color:var(--soft);}
  .rij{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;margin-top:.4rem;}
  .knop{background:var(--txt);color:#000;border:none;border-radius:10px;padding:.45rem .8rem;font:inherit;font-weight:600;font-size:.8rem;cursor:pointer;}
  .knop.stil{background:transparent;color:var(--txt);border:1px solid var(--line);font-weight:500;}
  .knop.aan{background:var(--gold);color:#000;border-color:var(--gold);}
  .melding{position:fixed;left:50%;bottom:1.2rem;transform:translateX(-50%);background:#000;border:1px solid var(--gold);color:var(--txt);padding:.55rem .9rem;border-radius:10px;font-size:.82rem;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90%;z-index:30;}
  .inlog{max-width:420px;margin:4rem auto;text-align:center;padding:0 1.2rem;}
  .inlog a{color:var(--gold);border-bottom:1px solid var(--gold);}
</style>
</head>
<body>
<header>
  <a class="terug" href="/apps/app.html">← App</a>
  <div><div class="ey">Alleen voor leden</div><h1>De RTG Mall</h1></div>
</header>
<main id="main">
  <p style="color:var(--muted);font-size:.9rem;line-height:1.6;max-width:60ch;">Alles wat je bij RTG koopt, op één plek. Het eigen-merk bestel je direct; bij de mode-boutieks gelden ledenprijzen en leg je een stuk apart of laat je een maat naar de paskamer brengen. Prijzen in euro.</p>
  <div id="etages"></div>
  <div id="gidsWrap"></div>
</main>

<section class="blad" id="blad" aria-label="Boutique">
  <div class="blad-kop">
    <button class="terug" id="bladTerug">← Mall</button>
    <div><div class="ey" id="bladStad" style="font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);"></div><h1 id="bladNaam" style="font-family:'Bodoni Moda',serif;font-size:1.3rem;"></h1></div>
  </div>
  <div class="art" id="bladArt"></div>
</section>

<div class="melding" id="melding" role="status"></div>
<script>
const $ = s => document.querySelector(s);
const esc = t => String(t==null?'':t).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const euro = n => (n==null) ? '' : new Intl.NumberFormat('nl-NL',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n);
let TOKEN = null; try { TOKEN = localStorage.getItem('rtg_member_token'); } catch (e) {}
function meld(t){ const m = $('#melding'); m.textContent = t; m.style.opacity = '1'; clearTimeout(m._t); m._t = setTimeout(() => m.style.opacity = '0', 2400); }
const api = (pad, body) => fetch(pad, {
  method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN },
  body: JSON.stringify(body || {})
}).then(async r => { const d = await r.json().catch(() => ({})); if (!r.ok) throw new Error(d.error || 'Er ging iets mis.'); return d; });

if (!TOKEN) {
  $('#main').innerHTML = '<div class="inlog"><h2 style="font-family:\'Bodoni Moda\',serif;">Log eerst in</h2>'+
    '<p style="color:var(--muted);margin-top:.6rem;line-height:1.6;">De RTG Mall is er voor leden. Open de app en log in met je RTG-account.</p>'+
    '<p style="margin-top:1rem;"><a href="/apps/app.html">Naar de app →</a></p></div>';
} else { laad(); }

async function laad(){
  let d;
  try { d = await api('/api/mall'); } catch(e){ $('#etages').innerHTML = '<div class="leeg">'+esc(e.message)+'</div>'; return; }
  if (!d.etages || !d.etages.length){ $('#etages').innerHTML = '<div class="leeg">De mall wordt ingericht. Kom snel terug.</div>'; return; }
  $('#etages').innerHTML = d.etages.map(e =>
    '<div class="etage"><div class="etage-kop"><h2>'+e.icon+' '+esc(e.label)+'</h2><span class="n">'+e.boutieks.length+' '+(e.boutieks.length===1?'boutique':'boutieks')+'</span></div>'+
    '<div class="boutieks">'+e.boutieks.map(b =>
      '<button class="boutiek" data-code="'+esc(b.code)+'" data-kind="'+esc(b.kind||'retail')+'" data-naam="'+esc(b.naam)+'" data-stad="'+esc(b.stad||'')+'">'+
        '<span class="stad">'+esc(b.stad||'RTG')+'</span>'+
        '<h3>'+esc(b.naam)+'</h3>'+
        '<span class="tag">'+esc(b.tagline)+'</span>'+
        '<span class="meta">'+b.aantal+' stuk(s)'+(b.vanaf!=null?' · vanaf '+euro(b.vanaf):'')+(b.categorieen.length?' · '+b.categorieen.map(esc).join(', '):'')+'</span>'+
      '</button>').join('')+'</div></div>'
  ).join('');
  $('#etages').querySelectorAll('.boutiek').forEach(b => b.addEventListener('click', () => openBoutiek(b.dataset.code, b.dataset.naam, b.dataset.stad, b.dataset.kind)));
  tekenGids(d.gids || []);
}

function tekenGids(genres){
  if (!genres.length){ $('#gidsWrap').innerHTML = ''; return; }
  $('#gidsWrap').innerHTML = '<div class="gids"><div class="etage-kop"><h2>Alle leveranciers</h2><span class="n">per genre · boek en reserveer</span></div>'+
    '<div class="genres">'+genres.map(g => {
      const namen = g.leveranciers.map(l => l.naam).slice(0,4).join(', ') + (g.aantal>4?' e.a.':'');
      return '<a class="genre" href="'+esc(g.pagina)+'"><span class="gi">'+g.icon+'</span>'+
        '<div><b>'+esc(g.label)+'</b><span class="gn">'+g.aantal+' adres'+(g.aantal===1?'':'sen')+'</span>'+
        '<span class="gl">'+esc(namen)+'</span>'+
        (g.boekbaar?'<span class="ga">Openen →</span>':'')+
        '</div></a>';
    }).join('')+'</div></div>';
}

let HUIDIG = null;
async function openBoutiek(code, naam, stad, kind){
  HUIDIG = code;
  $('#bladNaam').textContent = naam;
  $('#bladStad').textContent = stad || 'RTG';
  $('#bladArt').innerHTML = '<div class="leeg">Laden...</div>';
  $('#blad').classList.add('open');
  try {
    if (kind === 'eigen') { const d = await api('/api/mall/eigen'); tekenEigen(d.producten || []); }
    else if (kind === 'farm') { const d = await api('/api/mall/land', { code }); tekenFarm(d.producten || []); }
    else { const d = await api('/api/retail/catalogus', { supplierCode: code }); tekenArt(d.artikelen || []); }
  } catch(e){ $('#bladArt').innerHTML = '<div class="leeg">'+esc(e.message)+'</div>'; }
}
function tekenFarm(prod){
  $('#bladArt').innerHTML = prod.length ? prod.map(p =>
    '<div class="kaart">'+
      '<h3>'+esc(p.naam)+'</h3>'+
      '<span class="prijs">'+euro(p.prijs)+' <span style="color:var(--soft);font-size:.8rem;">'+esc(p.eenheid)+'</span></span>'+
      '<span class="opties">'+(p.voorraad>0?('nog '+p.voorraad+' beschikbaar'):'uitverkocht')+'</span>'+
      '<div class="rij"><button class="knop koopf" data-id="'+esc(p.id)+'" data-naam="'+esc(p.naam)+'" data-eenheid="'+esc(p.eenheid)+'">Bestellen</button></div>'+
    '</div>').join('') : '<div class="leeg">Deze boerderij heeft nu niets te koop.</div>';
  $('#bladArt').querySelectorAll('.koopf').forEach(b => b.addEventListener('click', () => koopFarm(HUIDIG, b.dataset.id, b.dataset.naam)));
}
function koopFarm(code, productId, naam){
  const wrap = document.createElement('div');
  wrap.className = 'blad open'; wrap.style.zIndex = '40';
  wrap.innerHTML = '<div class="blad-kop"><button class="terug" id="kfTerug">← Terug</button>'+
    '<div><div class="ey" style="font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);">Van het land</div><h1 style="font-family:\'Bodoni Moda\',serif;font-size:1.3rem;">'+esc(naam)+'</h1></div></div>'+
    '<div class="art" style="grid-template-columns:1fr;max-width:460px;"><div class="kaart">'+
      '<label class="opties">Naam voor de levering</label><input class="veld" id="kfNaam" maxlength="60" style="margin-bottom:.5rem;">'+
      '<label class="opties">E-mail</label><input class="veld" id="kfMail" type="email" maxlength="80" style="margin-bottom:.5rem;">'+
      '<label class="opties">Aantal</label><input class="veld" id="kfAantal" type="number" min="1" max="100" value="1" style="margin-bottom:.6rem;">'+
      '<button class="knop" id="kfBevestig" style="width:100%;">Bestelling plaatsen</button>'+
      '<p class="opties" style="margin-top:.5rem;">Vers van het erf; we nemen contact op voor de levering. Prijs in euro.</p>'+
    '</div></div>';
  document.body.appendChild(wrap);
  wrap.querySelector('#kfTerug').addEventListener('click', () => wrap.remove());
  wrap.querySelector('#kfBevestig').addEventListener('click', async () => {
    const naamV = wrap.querySelector('#kfNaam').value.trim(), mail = wrap.querySelector('#kfMail').value.trim();
    const aantal = wrap.querySelector('#kfAantal').value;
    if (!naamV){ meld('Vul je naam in.'); return; }
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(mail)){ meld('Vul een geldig e-mailadres in.'); return; }
    try { await api('/api/mall/land-bestel', { code, productId, naam: naamV, email: mail, aantal }); wrap.remove(); meld('Bestelling geplaatst. We nemen contact op.'); openBoutiek(code, naam, '', 'farm'); }
    catch(e){ meld(e.message); }
  });
}
function tekenEigen(prod){
  $('#bladArt').innerHTML = prod.length ? prod.map(p =>
    '<div class="kaart">'+
      (p.discipline?'<span class="cat">'+esc(p.discipline)+'</span>':(p.eigen?'<span class="cat">RTG Hardwarelab</span>':''))+
      '<h3>'+esc(p.naam)+'</h3>'+
      (p.beschrijving?'<span class="oms">'+esc(p.beschrijving)+'</span>':'')+
      '<span class="prijs">'+euro(p.eenmalig)+(p.perMaand?' <span style="color:var(--soft);font-size:.8rem;">+ '+euro(p.perMaand)+'/mnd</span>':'')+'</span>'+
      '<span class="opties">'+esc(p.eenheid)+' · euro, ex btw</span>'+
      '<div class="rij"><button class="knop koop" data-slug="'+esc(p.slug)+'" data-naam="'+esc(p.naam)+'">Bestellen</button></div>'+
    '</div>').join('') : '<div class="leeg">Het eigen-merk vult zich nog.</div>';
  $('#bladArt').querySelectorAll('.koop').forEach(b => b.addEventListener('click', () => koopEigen(b.dataset.slug, b.dataset.naam)));
}
function koopEigen(slug, naam){
  const wrap = document.createElement('div');
  wrap.className = 'blad open'; wrap.style.zIndex = '40';
  wrap.innerHTML = '<div class="blad-kop"><button class="terug" id="koopTerug">← Terug</button>'+
    '<div><div class="ey" style="font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);">Bestellen</div><h1 style="font-family:\'Bodoni Moda\',serif;font-size:1.3rem;">'+esc(naam)+'</h1></div></div>'+
    '<div class="art" style="grid-template-columns:1fr;max-width:460px;"><div class="kaart">'+
      '<label class="opties">Naam voor de levering</label><input class="veld" id="koopNaam" maxlength="60" style="margin-bottom:.5rem;">'+
      '<label class="opties">E-mail</label><input class="veld" id="koopMail" type="email" maxlength="80" style="margin-bottom:.5rem;">'+
      '<label class="opties">Aantal</label><input class="veld" id="koopAantal" type="number" min="1" max="50" value="1" style="margin-bottom:.5rem;">'+
      '<textarea class="veld" id="koopNote" rows="2" maxlength="500" placeholder="Opmerking (optioneel)" style="margin-bottom:.6rem;resize:vertical;"></textarea>'+
      '<button class="knop" id="koopBevestig" style="width:100%;">Bestelling plaatsen</button>'+
      '<p class="opties" style="margin-top:.5rem;">We nemen contact op voor de levering. Facturatie in euro, ex btw.</p>'+
    '</div></div>';
  document.body.appendChild(wrap);
  wrap.querySelector('#koopTerug').addEventListener('click', () => wrap.remove());
  wrap.querySelector('#koopBevestig').addEventListener('click', async () => {
    const naamV = wrap.querySelector('#koopNaam').value.trim(), mail = wrap.querySelector('#koopMail').value.trim();
    const aantal = wrap.querySelector('#koopAantal').value, note = wrap.querySelector('#koopNote').value.trim();
    if (!naamV){ meld('Vul je naam in.'); return; }
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(mail)){ meld('Vul een geldig e-mailadres in.'); return; }
    try { await api('/api/mall/bestel', { slug, naam: naamV, email: mail, aantal, note }); wrap.remove(); meld('Bestelling geplaatst. We nemen contact op.'); }
    catch(e){ meld(e.message); }
  });
}
function tekenArt(arts){
  $('#bladArt').innerHTML = arts.length ? arts.map(a => {
    const prijs = a.publiekePrijs != null ? a.publiekePrijs : a.price;
    return '<div class="kaart">'+
      (a.categorie?'<span class="cat">'+esc(a.categorie)+'</span>':'')+
      '<h3>'+esc(a.naam)+'</h3>'+
      (a.materiaal?'<span class="mat">'+esc(a.materiaal)+'</span>':'')+
      (a.omschrijving?'<span class="oms">'+esc(a.omschrijving)+'</span>':'')+
      '<span class="prijs">'+euro(prijs)+'</span>'+
      ((a.kleuren&&a.kleuren.length)||(a.maten&&a.maten.length)?'<span class="opties">'+esc((a.kleuren||[]).join(', '))+(a.maten&&a.maten.length?' · maten '+esc(a.maten.join('/')):'')+'</span>':'')+
      (a.drop?'<span class="opties" style="color:var(--gold);">Drop op '+esc(a.drop.datum)+' om '+esc(a.drop.tijd||'')+'</span>':'')+
      '<div class="rij">'+
        '<button class="knop stil wl'+(a.opWishlist?' aan':'')+'" data-id="'+esc(a.id)+'">'+(a.opWishlist?'♥ Op verlanglijst':'♡ Verlanglijst')+'</button>'+
      '</div></div>';
  }).join('') : '<div class="leeg">Deze boutique vult haar collectie nog.</div>';
  $('#bladArt').querySelectorAll('.wl').forEach(b => b.addEventListener('click', async () => {
    try { const r = await api('/api/retail/wishlist', { supplierCode: HUIDIG, artikelId: b.dataset.id });
      const aan = !!r.wishlist; b.classList.toggle('aan', aan); b.textContent = aan ? '♥ Op verlanglijst' : '♡ Verlanglijst';
      meld(aan ? 'Op je verlanglijst gezet.' : 'Van je verlanglijst gehaald.');
    } catch(e){ meld(e.message); }
  }));
}
$('#bladTerug').addEventListener('click', () => $('#blad').classList.remove('open'));
</script>
</body>
</html>
