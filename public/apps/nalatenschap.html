<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nalatenschap · Lifestyle Pass</title>
<link rel="icon" href="/icons/partners.svg">
<link href="/fonts/fonts.css" rel="stylesheet">
<style>
  :root{ --bg:#0C0C0B; --card:#151312; --card2:#1B1817; --line:rgba(255,255,255,0.10);
    --txt:#F4F1EC; --muted:rgba(244,241,236,0.68); --soft:rgba(244,241,236,0.5); --burgundy:#C23A5E; --gold:#A98F1C; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;padding-bottom:3rem;}
  h1,h2{font-family:'Bodoni Moda',serif;font-weight:500;letter-spacing:-.01em;}
  header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg),rgba(12,12,11,.86));backdrop-filter:blur(8px);padding:1rem 1.1rem .7rem;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:.8rem;}
  header .ey{font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);}
  header h1{font-size:1.35rem;}
  .terug{margin-left:auto;background:transparent;border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:.4rem .7rem;font:inherit;font-size:.8rem;cursor:pointer;}
  main{padding:1.1rem;max-width:760px;margin:0 auto;}
  .slot{background:linear-gradient(135deg,rgba(194,58,94,.1),rgba(169,143,7,.06));border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:.85rem 1.1rem;margin-bottom:.9rem;font-size:.85rem;color:var(--muted);display:flex;gap:.6rem;align-items:center;}
  .slot .lk{font-size:1.2rem;}
  .kaart{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1rem 1.1rem;margin-bottom:.9rem;}
  .kaart h2{font-size:1.05rem;margin-bottom:.5rem;}
  .veld,select.veld,textarea.veld{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--txt);font:inherit;font-size:.9rem;padding:.5rem .7rem;}
  select.veld{appearance:none;}
  textarea.veld{min-height:3.5rem;resize:vertical;}
  .rij{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem;}
  .rij>*{flex:1;min-width:6rem;}
  .knop{background:var(--gold);color:#000;border:none;border-radius:10px;font:inherit;font-weight:600;font-size:.85rem;padding:.5rem 1rem;cursor:pointer;}
  .knop.stil{background:transparent;color:var(--txt);border:1px solid var(--line);font-weight:400;}
  .item{border-top:1px solid var(--line);padding:.6rem 0;display:flex;gap:.6rem;align-items:flex-start;font-size:.9rem;}
  .item:first-child{border-top:0;}
  .item .b{flex:1;min-width:0;}
  .item .b small{color:var(--soft);display:block;margin-top:.15rem;}
  .rol{font-size:.66rem;padding:.1rem .5rem;border-radius:999px;border:1px solid var(--line);color:var(--muted);white-space:nowrap;text-transform:capitalize;}
  .weg{background:transparent;border:1px solid var(--line);color:var(--soft);border-radius:8px;width:1.8rem;height:1.8rem;cursor:pointer;flex-shrink:0;}
  .weg:hover{border-color:var(--gold);color:var(--txt);}
  .leeg{color:var(--soft);font-size:.86rem;padding:.4rem 0;}
  .melding{position:fixed;left:50%;bottom:1.2rem;transform:translateX(-50%);background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:.6rem 1rem;font-size:.85rem;opacity:0;transition:opacity .3s;z-index:30;pointer-events:none;}
  .inlog{text-align:center;padding:2.5rem 1rem;}
</style>
<link href="/shared/rtg-uniform.css" rel="stylesheet">
</head>
<body>
<header><div><div class="ey">Lifestyle Pass</div><h1>Nalatenschap</h1></div><a class="terug" href="/apps/app.html?pas=lifestyle">← app</a></header>
<main id="main"><div class="leeg">Laden…</div></main>
<div class="melding" id="melding"></div>
<script>
const $=s=>document.querySelector(s);
const esc=t=>String(t==null?'':t).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let TOKEN=null; try{ TOKEN=localStorage.getItem('rtg_member_token'); }catch(e){}
function meld(t){ const m=$('#melding'); m.textContent=t; m.style.opacity='1'; clearTimeout(m._t); m._t=setTimeout(()=>m.style.opacity='0',2600); }
const api=(pad,body)=>fetch('/api/member/rechterhand/'+pad,{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+TOKEN},body:JSON.stringify(body||{})}).then(async r=>{const d=await r.json().catch(()=>({}));if(!r.ok){const e=new Error(d.error||'Er ging iets mis.');e.status=r.status;throw e;}return d;});
const AIBOX=app=>'<div class="kaart"><h2>🤝 Vraag de adviseur</h2><div style="display:flex;gap:.5rem;"><input class="veld" id="aiV" style="flex:1;" placeholder="'+app+'"><button class="knop" id="aiK">Vraag</button></div><div id="aiA" style="margin-top:.6rem;font-size:.92rem;line-height:1.55;color:var(--muted);"></div></div>';
function bindAi(app){ const k=$('#aiK'); if(!k)return; k.onclick=async()=>{ const v=$('#aiV').value.trim(); if(!v)return; $('#aiA').textContent='Een ogenblik…'; try{ const r=await api('ai',{app,vraag:v}); $('#aiA').textContent=r.antwoord; $('#aiV').value=''; }catch(e){ $('#aiA').textContent=e.message; } }; $('#aiV').addEventListener('keydown',e=>{ if(e.key==='Enter') k.click(); }); }
async function laad(){
  if(!TOKEN){ $('#main').innerHTML='<div class="inlog"><h2>Log eerst in</h2></div>'; return; }
  let d; try{ d=await api('nalatenschap'); }catch(e){ if(e.status===403){ $('#main').innerHTML='<div class="inlog"><h2>Alleen met de Lifestyle Pass</h2><p style="color:var(--muted);margin-top:.6rem;">Nalatenschap is onderdeel van de Lifestyle Pass.</p></div>'; return; } $('#main').innerHTML='<div class="leeg">Kon het dossier niet laden.</div>'; return; }
  const soortOpts=d.soorten.map(s=>'<option>'+s+'</option>').join('');
  const rolOpts=d.rollen.map(r=>'<option>'+r+'</option>').join('');
  let h='<div class="slot"><span class="lk">🔐</span><div>De gevoelige gegevens hieronder (waar iets ligt, contactgegevens en uw wensen) staan <b>versleuteld</b> opgeslagen. Alleen u ziet ze, na inloggen.</div></div>';
  // documenten
  h+='<div class="kaart"><h2>📄 Documenten</h2><div id="docs">'+(d.documenten.length?d.documenten.map(x=>'<div class="item"><div class="b"><b>'+esc(x.titel)+'</b> <span class="rol">'+esc(x.soort)+'</span><small>'+[x.waar?'Ligt: '+esc(x.waar):'',esc(x.notitie)].filter(Boolean).join(' · ')+'</small></div><button class="weg" data-doc="'+x.id+'">×</button></div>').join(''):'<div class="leeg">Nog geen documenten.</div>')+'</div>'
    +'<div class="rij"><input class="veld" id="dT" placeholder="titel (bijv. testament)"><select class="veld" id="dS">'+soortOpts+'</select></div><div class="rij"><input class="veld" id="dW" placeholder="waar ligt het / hoe is het te vinden"></div><div class="rij"><input class="veld" id="dN" placeholder="notitie (optioneel)"></div><div style="margin-top:.5rem;"><button class="knop" id="dAdd">+ document</button></div></div>';
  // contacten
  h+='<div class="kaart"><h2>👤 Vertrouwenspersonen</h2><div id="con">'+(d.contacten.length?d.contacten.map(c=>'<div class="item"><div class="b"><b>'+esc(c.naam)+'</b> <span class="rol">'+esc(c.rol)+'</span><small>'+[esc(c.telefoon),esc(c.email),esc(c.notitie)].filter(Boolean).join(' · ')+'</small></div><button class="weg" data-con="'+c.id+'">×</button></div>').join(''):'<div class="leeg">Nog geen contacten.</div>')+'</div>'
    +'<div class="rij"><input class="veld" id="cN" placeholder="naam"><select class="veld" id="cR">'+rolOpts+'</select></div><div class="rij"><input class="veld" id="cT" placeholder="telefoon"><input class="veld" id="cE" placeholder="e-mail"></div><div style="margin-top:.5rem;"><button class="knop stil" id="cAdd">+ contact</button></div></div>';
  // wensen
  h+='<div class="kaart"><h2>🕊️ Wensen</h2><div id="wen">'+(d.wensen.length?d.wensen.map(w=>'<div class="item"><div class="b">'+(w.titel?'<b>'+esc(w.titel)+'</b> ':'')+'<small>'+esc(w.tekst)+'</small></div><button class="weg" data-wen="'+w.id+'">×</button></div>').join(''):'<div class="leeg">Nog geen wensen vastgelegd.</div>')+'</div>'
    +'<div class="rij"><input class="veld" id="wT" placeholder="titel (optioneel)"></div><div class="rij"><textarea class="veld" id="wX" placeholder="Wat wilt u vastleggen?"></textarea></div><div style="margin-top:.5rem;"><button class="knop stil" id="wAdd">+ wens</button></div></div>';
  h+=AIBOX('Bijv. welke documenten mis ik nog?');
  $('#main').innerHTML=h;
  bindAi('nalatenschap');
  $('#dAdd').onclick=async()=>{ const titel=$('#dT').value.trim(); if(!titel) return meld('Titel?'); try{ await api('nalatenschap/doc',{titel,soort:$('#dS').value,waar:$('#dW').value,notitie:$('#dN').value}); laad(); }catch(e){ meld(e.message); } };
  $('#cAdd').onclick=async()=>{ const naam=$('#cN').value.trim(); if(!naam) return meld('Naam?'); try{ await api('nalatenschap/contact',{naam,rol:$('#cR').value,telefoon:$('#cT').value,email:$('#cE').value}); laad(); }catch(e){ meld(e.message); } };
  $('#wAdd').onclick=async()=>{ const tekst=$('#wX').value.trim(); if(!tekst) return meld('Wat wilt u vastleggen?'); try{ await api('nalatenschap/wens',{titel:$('#wT').value,tekst}); laad(); }catch(e){ meld(e.message); } };
  document.querySelectorAll('[data-doc]').forEach(b=> b.onclick=async()=>{ if(!confirm('Dit document verwijderen?'))return; try{ await api('nalatenschap/doc/weg',{id:b.dataset.doc}); laad(); }catch(e){ meld(e.message); } });
  document.querySelectorAll('[data-con]').forEach(b=> b.onclick=async()=>{ try{ await api('nalatenschap/contact/weg',{id:b.dataset.con}); laad(); }catch(e){ meld(e.message); } });
  document.querySelectorAll('[data-wen]').forEach(b=> b.onclick=async()=>{ try{ await api('nalatenschap/wens/weg',{id:b.dataset.wen}); laad(); }catch(e){ meld(e.message); } });
}
laad();
</script>
<script src="/shared/schermbeeld.js" defer></script>
<script src="/shared/metgezel.js" defer></script>
</body>
</html>
