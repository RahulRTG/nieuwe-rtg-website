<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>RTG Nieuws</title>
<link rel="icon" href="/icons/partners.svg">
<link rel="manifest" href="/manifests/nieuws.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nieuws">
<link href="/fonts/fonts.css" rel="stylesheet">
<style>
  :root{ --bg:#0C0C0B; --card:#151312; --card2:#1B1817; --line:rgba(255,255,255,0.10);
    --txt:#F4F1EC; --muted:rgba(244,241,236,0.68); --soft:rgba(244,241,236,0.5); --burgundy:#C23A5E; --gold:#A98F1C; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;padding-bottom:3rem;}
  h1,h2{font-family:'Bodoni Moda',serif;font-weight:500;letter-spacing:-.01em;}
  header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg),rgba(12,12,11,.86));backdrop-filter:blur(8px);padding:calc(env(safe-area-inset-top) + 1rem) 1.1rem .7rem;border-bottom:1px solid var(--line);}
  header .ey{font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);}
  header h1{font-size:1.5rem;}
  main{padding:1.1rem;max-width:680px;margin:0 auto;}
  .rubrieken{display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.8rem;scrollbar-width:none;}
  .rubrieken::-webkit-scrollbar{display:none;}
  .rub{white-space:nowrap;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:.35rem .85rem;font-size:.8rem;color:var(--muted);cursor:pointer;text-transform:capitalize;}
  .rub.aan{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600;}
  .art{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1rem 1.1rem;margin-bottom:.8rem;cursor:pointer;transition:border-color .15s;}
  .art:hover{border-color:var(--gold);}
  .art .rlbl{font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);}
  .art h2{font-size:1.25rem;line-height:1.25;margin:.25rem 0 .3rem;}
  .art .intro{font-size:.9rem;color:var(--muted);line-height:1.55;}
  .art .meta{font-size:.72rem;color:var(--soft);margin-top:.45rem;}
  .lees h2{font-size:1.5rem;margin:.3rem 0 .5rem;}
  .lees .tekst{font-size:.98rem;line-height:1.7;color:var(--txt);white-space:pre-wrap;margin-top:.6rem;}
  .knop{background:var(--gold);color:#000;border:none;border-radius:10px;font:inherit;font-weight:600;font-size:.84rem;padding:.45rem 1rem;cursor:pointer;}
  .knop.stil{background:transparent;color:var(--txt);border:1px solid var(--line);font-weight:400;}
  .ai{border-top:1px solid var(--line);margin-top:1rem;padding-top:.8rem;}
  .ai .rij{display:flex;gap:.4rem;}
  .ai input{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--txt);font:inherit;font-size:.85rem;padding:.45rem .65rem;}
  .ai .uit{font-size:.9rem;color:var(--muted);line-height:1.6;margin-top:.6rem;white-space:pre-wrap;}
  .leeg{color:var(--soft);font-size:.9rem;text-align:center;padding:2.5rem 1rem;line-height:1.6;}
  .melding{position:fixed;left:50%;bottom:1.2rem;transform:translateX(-50%);background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:.6rem 1rem;font-size:.85rem;opacity:0;transition:opacity .3s;z-index:30;pointer-events:none;}
</style>
</head>
<body>
<header><div class="ey">Van RTG Redactie</div><h1>RTG Nieuws</h1></header>
<main id="main"><div class="leeg">Laden…</div></main>
<div class="melding" id="melding"></div>
<script>
const $=s=>document.querySelector(s);
const esc=t=>String(t==null?'':t).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let TOKEN=null; try{ TOKEN=localStorage.getItem('rtg_member_token'); }catch(e){}
function meld(t){ const m=$('#melding'); m.textContent=t; m.style.opacity='1'; clearTimeout(m._t); m._t=setTimeout(()=>m.style.opacity='0',2600); }
const api=(pad,body)=>fetch('/api/member/nieuws'+pad,{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+TOKEN},body:JSON.stringify(body||{})}).then(async r=>{const d=await r.json().catch(()=>({}));if(!r.ok){const e=new Error(d.error||'Er ging iets mis.');e.status=r.status;throw e;}return d;});
const MND=['','jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
const tijd=s=>{ if(!s)return ''; const d=new Date(s); return d.getDate()+' '+MND[d.getMonth()+1]+' '+d.getFullYear(); };
let RUB='', OPEN=null;
async function laad(){
  if(!TOKEN){ $('#main').innerHTML='<div class="leeg">Log eerst in via de RTG-app; daarna leest het nieuws hier.</div>'; return; }
  if(OPEN) return lees(OPEN);
  let d; try{ d=await api('',{rubriek:RUB}); }catch(e){ $('#main').innerHTML='<div class="leeg">'+esc(e.message)+'</div>'; return; }
  let h='<div class="rubrieken"><button class="rub'+(RUB===''?' aan':'')+'" data-r="">alles</button>'+d.rubrieken.map(r=>'<button class="rub'+(RUB===r?' aan':'')+'" data-r="'+r+'">'+r+'</button>').join('')+'</div>';
  h+= d.artikelen.length ? d.artikelen.map(a=>'<article class="art" data-id="'+a.id+'"><div class="rlbl">'+esc(a.rubriek)+'</div><h2>'+esc(a.kop)+'</h2><div class="intro">'+esc(a.intro||'')+'</div><div class="meta">door '+esc(a.auteur)+' · '+tijd(a.at)+'</div></article>').join('')
    : '<div class="leeg">Nog geen nieuws in deze rubriek.<br>De redactie is aan het schrijven.</div>';
  $('#main').innerHTML=h;
  document.querySelectorAll('.rub').forEach(b=> b.onclick=()=>{ RUB=b.dataset.r; laad(); });
  document.querySelectorAll('.art').forEach(a=> a.onclick=()=>{ OPEN=a.dataset.id; laad(); });
}
async function lees(id){
  let d; try{ d=await api('/artikel',{id}); }catch(e){ OPEN=null; meld(e.message); return laad(); }
  const a=d.artikel;
  $('#main').innerHTML='<button class="knop stil" id="terug">← alle artikelen</button>'
    +'<article class="lees" style="margin-top:.8rem;"><div class="rlbl" style="font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);">'+esc(a.rubriek)+'</div>'
    +'<h2>'+esc(a.kop)+'</h2><div style="font-size:.75rem;color:var(--soft);">door '+esc(a.auteur)+' · '+tijd(a.at)+'</div>'
    +(a.intro?'<div style="font-size:.98rem;color:var(--muted);line-height:1.6;margin-top:.6rem;font-style:italic;">'+esc(a.intro)+'</div>':'')
    +'<div class="tekst">'+esc(a.tekst)+'</div>'
    +'<div class="ai"><div class="rij"><input id="aiV" placeholder="Vraag Rahul iets over dit stuk, of laat het samenvatten"><button class="knop" id="aiK">Vraag</button></div><div class="uit" id="aiA"></div></div></article>';
  $('#terug').onclick=()=>{ OPEN=null; laad(); };
  const vraag=async()=>{ $('#aiA').textContent='Rahul leest mee…';
    try{ const r=await api('/ai',{id,vraag:$('#aiV').value.trim()}); $('#aiA').textContent=r.antwoord; }catch(e){ $('#aiA').textContent=e.message; } };
  $('#aiK').onclick=vraag;
  $('#aiV').addEventListener('keydown',e=>{ if(e.key==='Enter') vraag(); });
}
laad();
</script>
<script src="/shared/schermbeeld.js" defer></script>
<script src="/shared/metgezel.js" defer></script>
</body>
</html>
