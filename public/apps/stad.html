<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mijn Stad</title>
<link rel="icon" href="/icons/partners.svg">
<link href="/fonts/fonts.css" rel="stylesheet">
<style>
  :root{
    --bg:#0C0C0B; --card:#151312; --card2:#1B1817; --line:rgba(255,255,255,0.10);
    --txt:#F4F1EC; --muted:rgba(244,241,236,0.68); --soft:rgba(244,241,236,0.5);
    --burgundy:#C23A5E; --gold:#A98F1C; --green:#4C9A75;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;padding-bottom:3rem;}
  h1,h2,h3{font-family:'Bodoni Moda',serif;font-weight:500;letter-spacing:-.01em;}
  header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg),rgba(12,12,11,.86));backdrop-filter:blur(8px);padding:1rem 1.1rem .7rem;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:.8rem;}
  header .ey{font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);}
  header h1{font-size:1.4rem;margin-top:.05rem;}
  .terug{background:transparent;border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:.4rem .7rem;font:inherit;font-size:.8rem;cursor:pointer;}
  main{padding:1.1rem;max-width:760px;margin:0 auto;}
  .kaart{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1.1rem;margin-top:1rem;}
  .sec{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);margin:1.6rem 0 .3rem;}
  .knop{background:var(--gold);color:#0C0C0B;border:none;border-radius:11px;padding:.55rem 1rem;font:inherit;font-weight:600;font-size:.85rem;cursor:pointer;}
  .knop:active{transform:scale(.98);}
  input,select{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:.5rem .6rem;font:inherit;font-size:.9rem;}
  label{font-size:.72rem;color:var(--soft);display:block;margin-bottom:.3rem;}
  .rij{display:flex;gap:.5rem;flex-wrap:wrap;align-items:flex-end;}
  .leeg{color:var(--muted);font-size:.9rem;padding:1rem 0;text-align:center;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.6rem;margin-top:.8rem;}
  .dom{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:.7rem .8rem;}
  .dom .l{font-size:.68rem;color:var(--soft);text-transform:uppercase;letter-spacing:.1em;}
  .dom .w{font-family:'Bodoni Moda',serif;font-size:1.15rem;margin-top:.2rem;}
  .melding-rij{padding:.6rem 0;border-bottom:1px solid var(--line);font-size:.86rem;line-height:1.5;}
  .melding-rij:last-child{border-bottom:none;}
  .pil{font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--line);border-radius:999px;padding:.12rem .5rem;}
  .toast{position:fixed;left:50%;bottom:1.1rem;transform:translateX(-50%);background:#000;border:1px solid var(--gold);color:var(--txt);padding:.55rem .9rem;border-radius:10px;font-size:.82rem;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90%;}
</style>
</head>
<body>
<header>
  <button class="terug" id="terug">←</button>
  <div><div class="ey">RTG Stad · voor bewoners</div><h1>🏙️ Mijn Stad</h1></div>
</header>
<main id="app"><div class="leeg">Laden…</div></main>
<div class="toast" id="toast" role="status"></div>
<script>
const $ = s => document.querySelector(s);
const esc = t => String(t==null?'':t).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let TOKEN = null; try { TOKEN = localStorage.getItem('rtg_member_token'); } catch (e) {}
$('#terug').addEventListener('click', () => { location.href = '/apps/app.html'; });
const api = (pad, body) => fetch('/api/' + pad, {
  method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN },
  body: JSON.stringify(body || {})
}).then(async r => { const d = await r.json().catch(() => ({})); if (!r.ok) throw new Error(d.error || 'Er ging iets mis.'); return d; });
function toast(t){ const m = $('#toast'); m.textContent = t; m.style.opacity = '1'; clearTimeout(m._t); m._t = setTimeout(() => m.style.opacity = '0', 2600); }

const STAND = { rustig: 'var(--green)', normaal: '#F4F1EC', druk: 'var(--burgundy)', stil: 'var(--soft)' };
const tijd = ms => { const m = Math.round((Date.now() - ms) / 60000); return m < 1 ? 'zojuist' : m < 60 ? m + ' min geleden' : Math.round(m / 60) + ' u geleden'; };

let B = null;
async function laad(){
  try { B = await api('stad/bewoner'); render(); }
  catch (e) { $('#app').innerHTML = '<div class="leeg">' + esc(e.message) + '</div>'; }
}
function render(){
  $('#app').innerHTML =
    '<div class="kaart"><h2 style="font-size:1.1rem;">' + esc(B.scenario.label) + '</h2>' +
      '<p style="color:var(--muted);font-size:.85rem;margin-top:.3rem;line-height:1.55;">' + esc(B.scenario.uitleg) + '</p>' +
      (B.alerts.length ? '<div style="margin-top:.7rem;padding:.55rem .7rem;border:1px solid var(--gold);border-radius:10px;font-size:.83rem;line-height:1.55;">' + B.alerts.map(a => '⚠️ ' + esc(a.tekst)).join('<br>') + '</div>' : '') +
    '</div>' +
    '<div class="sec">Hoe de stad er nu bij staat</div>' +
    '<div class="grid">' + B.domeinen.map(d =>
      '<div class="dom"><div class="l">' + esc(d.label) + '</div>' +
      '<div class="w" style="color:' + (STAND[d.stand] || '#F4F1EC') + ';">' +
        (d.waarde == null ? 'stil' : esc(String(d.waarde)) + ' <span style="font-size:.65rem;color:var(--soft);">' + esc(d.eenheid) + '</span>') + '</div>' +
      '<div style="font-size:.72rem;color:var(--soft);margin-top:.15rem;">' + esc(d.stand) + '</div></div>').join('') + '</div>' +
    '<div class="sec">Iets kapot of vol gezien? Meld het</div>' +
    '<div class="kaart"><div class="rij">' +
      '<span><label for="mZone">Waar</label><select id="mZone">' + B.zones.map(z => '<option>' + esc(z) + '</option>').join('') + '</select></span>' +
      '<span><label for="mSoort">Wat</label><select id="mSoort">' + Object.entries(B.soorten).map(([k, v]) => '<option value="' + k + '">' + esc(v) + '</option>').join('') + '</select></span>' +
      '<span style="flex:1;min-width:12rem;"><label for="mTekst">Korte omschrijving</label><input id="mTekst" maxlength="200" placeholder="bijv. lantaarn bij de brug doet het niet" style="width:100%;"></span>' +
      '<button class="knop" id="mDoe">Meld</button></div>' +
    '<p style="font-size:.75rem;color:var(--soft);margin-top:.6rem;line-height:1.5;">' + esc(B.privacy) + '</p></div>' +
    '<div class="sec">Mijn meldingen</div>' +
    '<div class="kaart" id="mijnM">' + (B.mijnMeldingen.length ? B.mijnMeldingen.map(m =>
      '<div class="melding-rij">' + esc(m.tekst) +
      '<br><span style="font-size:.74rem;color:var(--soft);">' + esc(m.zone) + ' · ' + tijd(m.at) + '</span> ' +
      '<span class="pil" style="color:' + (m.status === 'klaar' ? 'var(--green)' : 'var(--gold)') + ';">' + (m.status === 'klaar' ? '✓ opgelost' : 'de veldploeg kijkt ernaar') + '</span></div>').join('')
      : '<div class="leeg">Nog geen meldingen. Zie je iets, dan hoort de stad het graag.</div>') + '</div>';
  $('#mDoe').addEventListener('click', async () => {
    try {
      await api('stad/melding', { zone: $('#mZone').value, soort: $('#mSoort').value, tekst: $('#mTekst').value });
      toast('Dank je. De veldploeg heeft je melding.');
      laad();
    } catch (e) { toast(e.message); }
  });
}

/* Live: wordt je melding buiten klaargemeld, dan geeft de server een seintje
   (scope 'stad') en ziet de bewoner het meteen. */
let ES = null, EST = null;
function live(){
  if (!window.EventSource || ES || !TOKEN) return;
  try { ES = new EventSource('/api/stream?token=' + encodeURIComponent(TOKEN)); } catch (e) { return; }
  ES.addEventListener('sync', e => {
    let scope = null; try { scope = JSON.parse(e.data).scope; } catch (x) {}
    if (scope !== 'stad' || !B) return;
    clearTimeout(EST); EST = setTimeout(laad, 400);
  });
}

laad();
live();
</script>
</body>
</html>
