<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0C0C0B">
<title>De Zorgbalie · RTG Care</title>
<style>
  :root{
    --bg:#0C0C0B; --card:#151312; --card2:#1B1817;
    --line:rgba(255,255,255,0.09);
    --txt:#F4F1EC; --muted:rgba(244,241,236,0.70); --soft:rgba(244,241,236,0.55);
    --burgundy:#C23A5E; --burgundy-deep:#7F1634;
    --gold:#A98F1C; --green:#4C9A75; --sage:#8BC3A8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    background:
      radial-gradient(120% 45% at 50% -8%, rgba(169,143,28,0.07), transparent 60%),
      radial-gradient(130% 55% at 50% 110%, rgba(127,23,52,0.07), transparent 62%),
      var(--bg);
    color:var(--txt);
    min-height:100dvh; -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:'Bodoni Moda','Cormorant Garamond',Georgia,serif;font-weight:500;letter-spacing:-0.01em;margin:0;}
  .wrap{max-width:760px;margin:0 auto;padding:1.1rem 1.1rem calc(env(safe-area-inset-bottom,0) + 2rem);}
  .top{display:flex;align-items:center;gap:0.7rem;padding:0.4rem 0 1rem;border-bottom:1px solid var(--line);margin-bottom:1.1rem;}
  .brand{width:40px;height:40px;border-radius:11px;background:var(--burgundy-deep);display:flex;align-items:center;justify-content:center;font-family:'Bodoni Moda',serif;font-size:0.7rem;letter-spacing:0.04em;color:#F4F1EC;flex:none;}
  .top h1{font-size:1.15rem;line-height:1.1;}
  .top .sub{font-size:0.72rem;color:var(--soft);letter-spacing:0.02em;}
  .card{background:linear-gradient(160deg, color-mix(in srgb, var(--card) 91%, #fff), color-mix(in srgb, var(--card) 95%, #000));
    border:1px solid var(--line);border-radius:12px;padding:1rem;margin-bottom:0.8rem;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);}
  label{display:block;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--soft);margin-bottom:0.3rem;}
  input{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:0.65rem 0.8rem;font-size:0.95rem;color:var(--txt);outline:none;
    transition:border-color 0.13s cubic-bezier(0.22,0.7,0.3,1);}
  input:focus{border-color:color-mix(in srgb, var(--gold) 55%, var(--line));}
  input:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}
  .btn{background:var(--burgundy);border:none;border-radius:10px;padding:0.7rem 1rem;font-size:0.9rem;font-weight:600;color:#fff;cursor:pointer;
    transition:transform 0.13s cubic-bezier(0.22,0.7,0.3,1), filter 0.13s cubic-bezier(0.22,0.7,0.3,1);}
  @media (hover:hover){.btn:hover{filter:brightness(1.1);}}
  .btn:active{transform:scale(0.97);}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt);font-weight:500;}
  .btn:disabled{opacity:0.5;cursor:default;}
  .row{display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;}
  .chip{background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:0.4rem 0.8rem;font-size:0.8rem;color:var(--muted);cursor:pointer;}
  .chip.on{background:rgba(139,195,168,0.16);border-color:rgba(139,195,168,0.5);color:var(--txt);}
  .appt{border:1px solid var(--line);border-radius:11px;padding:0.85rem;margin-top:0.7rem;
    background:linear-gradient(160deg, color-mix(in srgb, var(--card2) 91%, #fff), color-mix(in srgb, var(--card2) 95%, #000));
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
    transition:border-color 0.13s cubic-bezier(0.22,0.7,0.3,1);}
  @media (hover:hover){.appt:hover{border-color:color-mix(in srgb, var(--gold) 55%, var(--line));}}
  .appt .t{font-family:'Bodoni Moda',serif;font-size:1.15rem;color:var(--gold);font-variant-numeric:tabular-nums;}
  .appt .beh{font-size:0.95rem;margin-top:0.1rem;}
  .appt .who{font-size:0.78rem;color:var(--soft);margin-top:0.15rem;}
  .flag{margin-top:0.55rem;border-radius:10px;padding:0.5rem 0.65rem;font-size:0.82rem;line-height:1.35;}
  .flag.zorg{background:rgba(169,143,28,0.12);border:1px solid rgba(169,143,28,0.4);}
  .flag.intake{background:rgba(194,58,94,0.1);border:1px solid rgba(194,58,94,0.35);}
  .flag b{color:var(--txt);}
  .done{font-size:0.78rem;color:var(--sage);}
  .empty{color:var(--soft);font-size:0.85rem;padding:0.6rem 0;}
  .beh-kop{font-size:0.66rem;text-transform:uppercase;letter-spacing:0.14em;color:var(--soft);margin:1.3rem 0 0.2rem;}
  .toast{position:fixed;left:50%;bottom:1.3rem;transform:translateX(-50%);background:var(--card2);border:1px solid var(--line);border-radius:11px;padding:0.6rem 1rem;font-size:0.85rem;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:50;}
  .toast.show{opacity:1;}
  .muted{color:var(--soft);font-size:0.8rem;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand">RTG</div>
    <div>
      <h1>De Zorgbalie</h1>
      <div class="sub" id="subtitle">De agenda van uw behandelaars · RTG Care</div>
    </div>
  </div>

  <div id="login">
    <div class="card">
      <h2 style="font-size:1rem;margin-bottom:0.7rem;">Aanmelden</h2>
      <div style="margin-bottom:0.7rem;"><label for="u">Gebruikersnaam</label><input id="u" autocomplete="username" placeholder="uw naam"></div>
      <div style="margin-bottom:0.9rem;"><label for="p">Wachtwoord</label><input id="p" type="password" autocomplete="current-password"></div>
      <button class="btn" id="loginBtn" style="width:100%;">Aanmelden</button>
      <p class="muted" id="loginErr" style="margin:0.6rem 0 0;color:var(--burgundy);display:none;"></p>
      <p class="muted" style="margin-top:0.8rem;">Voor uw eigen naam en pincode meldt u zich aan via de RTG-leveranciers-app; de agenda opent daar ook.</p>
    </div>
  </div>

  <div id="app" style="display:none;">
    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <div><b id="aanbNaam">·</b><div class="muted" id="aanbInfo"></div></div>
        <button class="btn ghost" id="uit" style="padding:0.4rem 0.8rem;font-size:0.8rem;">Afmelden</button>
      </div>
      <div class="beh-kop">Welke dag</div>
      <div class="row" id="dagen"></div>
    </div>
    <div id="agenda"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
  var $ = function(s){ return document.querySelector(s); };
  var token = null, datum = new Date().toISOString().slice(0,10);
  var eur = function(c){ return '€ ' + (Number(c)/1).toFixed(2).replace('.',','); };
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  function toast(m){ var t=$('#toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); }, 2200); }
  function api(pad, body){
    return fetch('/api/'+pad, { method:'POST', headers:{ 'Content-Type':'application/json', Authorization: token ? 'Bearer '+token : '' }, body: JSON.stringify(body||{}) })
      .then(function(r){ return r.json().then(function(j){ return { status:r.status, body:j }; }); });
  }

  // ingelogd blijven binnen deze sessie
  try { token = sessionStorage.getItem('rtg_zorgbalie'); } catch(e){}
  if (token) start();

  $('#loginBtn').addEventListener('click', doLogin);
  $('#p').addEventListener('keydown', function(e){ if (e.key==='Enter') doLogin(); });
  function doLogin(){
    var u=$('#u').value.trim(), p=$('#p').value;
    if (!u || !p) return;
    api('supplier/login', { username:u, password:p }).then(function(r){
      if (r.status !== 200 || !r.body.token){ var e=$('#loginErr'); e.textContent = r.body.error || 'Aanmelden lukte niet.'; e.style.display='block'; return; }
      token = r.body.token;
      try { sessionStorage.setItem('rtg_zorgbalie', token); } catch(e){}
      start();
    });
  }

  $('#uit').addEventListener('click', function(){
    token = null; try { sessionStorage.removeItem('rtg_zorgbalie'); } catch(e){}
    $('#app').style.display='none'; $('#login').style.display='';
  });

  function start(){
    $('#login').style.display='none'; $('#app').style.display='';
    var d = $('#dagen'); d.innerHTML='';
    for (var i=0;i<7;i++){
      var dt = new Date(Date.now()+i*86400000).toISOString().slice(0,10);
      var b = document.createElement('button');
      b.className = 'chip' + (dt===datum?' on':'');
      b.textContent = i===0 ? 'vandaag' : dt.slice(8)+'/'+dt.slice(5,7);
      b.dataset.d = dt;
      b.addEventListener('click', function(){ datum = this.dataset.d; laad(); });
      d.appendChild(b);
    }
    laad();
  }

  function laad(){
    document.querySelectorAll('#dagen .chip').forEach(function(c){ c.classList.toggle('on', c.dataset.d===datum); });
    api('supplier/care/agenda', { datum: datum }).then(function(r){
      if (r.status !== 200){
        if (r.status===401){ $('#uit').click(); return; }
        $('#agenda').innerHTML = '<div class="card empty">'+esc((r.body&&r.body.error)||'Kon de agenda niet laden.')+'</div>';
        return;
      }
      var a = r.body;
      $('#aanbNaam').textContent = a.aanbieder || 'Zorgaanbieder';
      $('#aanbInfo').textContent = (a.behandelaars||[]).map(function(b){ return b.naam; }).join(' · ');
      render(a);
    });
  }

  function render(a){
    var el = $('#agenda'); el.innerHTML='';
    var behs = a.behandelaars || [];
    if (!behs.length){ el.innerHTML = '<div class="card empty">Nog geen behandelaars.</div>'; return; }
    behs.forEach(function(b){
      var mine = (a.afspraken||[]).filter(function(x){ return x.behandelaarId===b.id; });
      var kop = document.createElement('div');
      kop.className='beh-kop'; kop.textContent = b.naam + (b.functie ? ' · '+b.functie : '');
      el.appendChild(kop);
      var card = document.createElement('div'); card.className='card';
      if (!mine.length){ card.innerHTML = '<div class="empty">Geen afspraken op deze dag.</div>'; el.appendChild(card); return; }
      card.innerHTML = mine.map(function(x){
        var af = x.status==='afgerond';
        var flags = '';
        if (x.zorg && (x.zorg.allergenen || x.zorg.dieet || x.zorg.medisch)){
          flags += '<div class="flag zorg">🌿 <b>Zorgprofiel</b>: '+
            [ x.zorg.allergenen ? 'allergisch: '+esc(x.zorg.allergenen) : '', x.zorg.dieet ? 'dieet: '+esc(x.zorg.dieet) : '', x.zorg.medisch ? esc(x.zorg.medisch) : '' ].filter(Boolean).join(' · ')+'</div>';
        }
        if (x.intake){ flags += '<div class="flag intake">🩺 <b>Gedeelde intake</b>: '+esc(x.intake)+'</div>'; }
        return '<div class="appt">'+
          '<div class="t">'+esc(x.tijd)+'</div>'+
          '<div class="beh">'+esc(x.behandelingNaam)+' <span class="muted">· '+x.duurMin+' min · '+eur(x.prijs)+'</span></div>'+
          '<div class="who">Gast: '+esc(x.codenaam||'-')+'</div>'+
          flags+
          '<div class="row" style="margin-top:0.6rem;">'+
            (af ? '<span class="done">✅ Afgerond</span>'
                : '<button class="btn" data-af="'+esc(x.ref)+'" style="padding:0.45rem 0.9rem;font-size:0.82rem;">Afronden</button>')+
          '</div></div>';
      }).join('');
      el.appendChild(card);
    });
    el.querySelectorAll('[data-af]').forEach(function(btn){
      btn.addEventListener('click', function(){
        api('supplier/care/afronden', { ref: btn.dataset.af }).then(function(r){
          if (r.status!==200){ toast((r.body&&r.body.error)||'Lukte niet.'); return; }
          toast('Afgerond. Fijne dag.'); laad();
        });
      });
    });
  }
})();
</script>
</body>
</html>
